<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ぷよぷよ</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { height: 100%; }
  body {
    margin: 0;
    background: #1a1430;
    color: #fff;
    font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 24px;
    overscroll-behavior: none;
    -webkit-user-select: none;
    user-select: none;
    touch-action: manipulation;
  }
  .game {
    display: flex;
    gap: 24px;
    align-items: flex-start;
  }
  h1 { font-size: 28px; margin: 0; letter-spacing: 3px; }
  /* タイトル＋NEXTを盤面の真上に並べる（盤面の近くで次が見える） */
  .board-head {
    display: flex; align-items: flex-end; justify-content: space-between;
    width: 272px; margin-bottom: 12px; gap: 12px;
  }
  .next-head { display: flex; flex-direction: column; align-items: center; gap: 3px; }
  .next-head .label { font-size: 11px; color: #a99fd6; letter-spacing: 2px; }
  /* スマホ用のコンパクトなSCORE/CHAIN表示・設定ボタン(PCでは非表示) */
  .mobile-hud { display: none; gap: 14px; align-items: center; }
  .mh-stat { display: flex; flex-direction: column; align-items: flex-start; line-height: 1.05; }
  .mh-label { font-size: 10px; color: #a99fd6; letter-spacing: 1px; }
  .mh-val { font-size: 22px; font-weight: bold; }
  .gear {
    display: none; width: 40px; height: 40px; border-radius: 10px; flex: 0 0 auto;
    border: 2px solid #4a3f7a; background: #241c45; color: #cfc8ec; font-size: 20px;
    cursor: pointer; touch-action: manipulation; align-items: center; justify-content: center;
  }
  .gear:active { background: #2f2658; }
  .drawer-backdrop {
    position: fixed; inset: 0; background: rgba(10,7,25,0.6);
    display: none; z-index: 40;
  }
  .drawer-backdrop.show { display: block; }
  .drawer-close {
    display: none; margin-top: 4px; width: 100%; padding: 12px 0;
    border: none; border-radius: 8px; background: #6c5ce7; color: #fff;
    font-size: 15px; font-weight: bold; cursor: pointer; touch-action: manipulation;
  }
  canvas {
    background: #0d0a1f;
    border: 4px solid #4a3f7a;
    border-radius: 8px;
    display: block;
    image-rendering: auto;
  }
  .panel {
    min-width: 200px;
    background: #241c45;
    border: 2px solid #4a3f7a;
    border-radius: 10px;
    padding: 20px;
  }
  .stat { margin-bottom: 18px; }
  .stat .label { font-size: 13px; color: #a99fd6; letter-spacing: 1px; }
  .stat .value { font-size: 34px; font-weight: bold; }
  .next-box {
    background: #0d0a1f;
    border: 2px solid #4a3f7a;
    border-radius: 6px;
    width: 56px; height: 80px;   /* ヘッダー用に小さく表示(内部解像度はそのまま) */
    display: block;
  }
  .speed { margin-bottom: 18px; }
  .speed .label { font-size: 13px; color: #a99fd6; letter-spacing: 1px; }
  .speed .row { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
  .speed input[type=range] {
    flex: 1; accent-color: #6c5ce7; cursor: pointer;
  }
  .speed .num { font-size: 18px; font-weight: bold; width: 1.4em; text-align: center; }
  .colors { margin-bottom: 18px; }
  .colors .label { font-size: 13px; color: #a99fd6; letter-spacing: 1px; }
  .seg { display: flex; gap: 8px; margin-top: 8px; }
  .seg-btn {
    flex: 1; padding: 8px 0; border-radius: 8px; cursor: pointer;
    border: 2px solid #4a3f7a; background: #1a1430; color: #cfc8ec;
    font-size: 15px; font-weight: bold; letter-spacing: 1px;
    touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    transition: background .12s ease, border-color .12s ease, color .12s ease;
  }
  .seg-btn.is-on { background: #6c5ce7; border-color: #6c5ce7; color: #fff; }
  .sound-toggle {
    display: flex; align-items: center; gap: 8px;
    font-size: 14px; color: #cfc8ec; margin-bottom: 14px; cursor: pointer;
    user-select: none;
  }
  .sound-toggle input { width: 16px; height: 16px; accent-color: #6c5ce7; cursor: pointer; }
  .keys { font-size: 13px; line-height: 2.0; color: #cfc8ec; margin-top: 10px; }
  .keys b { color: #fff; }
  .overlay {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(10,7,25,0.82);
    border-radius: 4px;
  }
  .overlay.show { display: flex; }
  .overlay h2 { font-size: 28px; margin: 0 0 8px; }
  .overlay button {
    margin-top: 12px;
    padding: 10px 22px;
    font-size: 15px;
    border: none;
    border-radius: 6px;
    background: #6c5ce7;
    color: #fff;
    cursor: pointer;
  }
  .overlay button:hover { background: #836df0; }
  .board-wrap { position: relative; }
  /* 画面上のコントローラー */
  .pad {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: 14px;
    margin-top: 18px;
    width: 272px;
  }
  .pad-group { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .pad-label { font-size: 12px; color: #a99fd6; letter-spacing: 2px; }
  .pad-row { display: flex; gap: 10px; }
  .btn {
    width: 56px; height: 56px; border-radius: 50%;
    border: none; color: #fff; font-size: 22px; line-height: 1;
    cursor: pointer; user-select: none; -webkit-user-select: none;
    touch-action: manipulation; -webkit-tap-highlight-color: transparent;
    background: #4a3f7a; box-shadow: 0 4px 0 #2c2550;
    transition: transform .05s ease, box-shadow .05s ease;
  }
  .btn:active { transform: translateY(4px); box-shadow: 0 0 0 #2c2550; }
  .btn.rot {
    width: 60px; height: 60px; font-size: 26px;
    background: #6c5ce7; box-shadow: 0 4px 0 #4733b8;
  }
  .btn.rot:active { box-shadow: 0 0 0 #4733b8; }

  /* スマホ・縦画面向け: 画面を固定し、盤面＋操作パッドを1画面に収める */
  @media (max-width: 720px) {
    /* ページ全体をビューポートに固定してスクロール・バウンドを止める。
       高さは JS が実測した可視領域(--app-height = visualViewport/innerHeight)を使う。
       svh/dvh はブラウザによって挙動が不安定なため、実測値を最優先にして
       アドレスバーやツールバーが出ていても下の操作ボタンが必ず収まるようにする */
    html, body {
      position: fixed; top: 0; left: 0; right: 0; width: 100%;
      height: 100vh;                 /* JS非対応時のフォールバック */
      height: var(--app-height, 100vh);
      /* ベースの min-height:100vh を必ず打ち消す。これを残すと min-height が height より
         優先され、body が 100vh(ツールバー込みの大きい高さ)に引き伸ばされて下端が
         ツールバーの裏に潜り込み、操作ボタンが隠れてしまう */
      min-height: 0;
      overflow: hidden; touch-action: none; overscroll-behavior: none;
    }
    body {
      padding: 8px;
      padding-top: max(8px, env(safe-area-inset-top));
      padding-bottom: max(8px, env(safe-area-inset-bottom));
      align-items: stretch;
    }
    .game {
      flex-direction: column; gap: 6px; width: 100%; height: 100%; align-items: stretch;
    }
    .left { flex: 1; min-height: 0; width: 100%; display: flex; flex-direction: column; align-items: center; }
    h1 { display: none; }               /* タイトルは省いてスペースを確保 */
    /* ヘッダー: SCORE/CHAIN・NEXT・設定ボタンを1行に */
    .board-head {
      width: 100%; max-width: 460px; margin: 0 auto 2px;
      justify-content: space-between; align-items: center; gap: 10px;
    }
    .mobile-hud { display: flex; }
    .gear { display: inline-flex; }
    .next-head .label { font-size: 9px; }
    .next-box { width: 44px; height: 64px; }
    /* 盤面: 残りの高さいっぱいに収める(縦横比を保って縮小) */
    .board-wrap { flex: 1; min-height: 0; display: flex; justify-content: center; align-items: center; width: 100%; }
    #board { height: 100%; width: auto; max-width: 100%; }
    .keys { display: none; }            /* キーボード説明はスマホでは不要 */
    /* 操作パッド: 下部に固定的に配置。指で押しやすい大きさに */
    .pad { width: 100%; max-width: 460px; margin: 6px auto 4px; justify-content: space-around; flex: 0 0 auto; }
    .btn { width: 64px; height: 64px; font-size: 24px; }
    .btn.rot { width: 68px; height: 68px; font-size: 28px; }
    /* 設定パネルはボトムシート(ドロワー)として下から出す */
    .panel {
      position: fixed; left: 0; right: 0; bottom: 0; width: 100%; max-width: none;
      border-radius: 16px 16px 0 0; border-width: 2px 0 0 0;
      transform: translateY(110%); transition: transform .25s ease;
      z-index: 50; max-height: 82%; overflow-y: auto;
      padding-bottom: max(20px, env(safe-area-inset-bottom));
    }
    .panel.open { transform: translateY(0); }
    .panel .stat { display: none; }     /* SCORE/CHAINはヘッダーに出すのでドロワーでは隠す */
    .drawer-close { display: block; }
  }
</style>
</head>
<body>
<div class="game">
  <div class="left">
    <div class="board-head">
      <h1>ぷよぷよ</h1>
      <div class="mobile-hud">
        <div class="mh-stat"><span class="mh-label">SCORE</span><span class="mh-val" id="score-m">0</span></div>
        <div class="mh-stat"><span class="mh-label">CHAIN</span><span class="mh-val" id="chain-m">0</span></div>
      </div>
      <div class="next-head">
        <span class="label">NEXT</span>
        <canvas class="next-box" id="next" width="96" height="136"></canvas>
      </div>
      <button class="gear" id="settings-btn" aria-label="設定">⚙</button>
    </div>
    <div class="board-wrap">
      <canvas id="board" width="264" height="528"></canvas>
      <div class="overlay" id="overlay">
        <h2 id="overlay-title">GAME OVER</h2>
        <div id="overlay-sub"></div>
        <button id="restart">もう一度</button>
      </div>
    </div>
    <!-- 画面上のコントローラー: 左手=移動 / 右手=回転 -->
    <div class="pad">
      <div class="pad-group">
        <div class="pad-label">移動</div>
        <div class="pad-row">
          <button class="btn dir" id="btn-left" aria-label="左へ移動">◀</button>
          <button class="btn dir" id="btn-down" aria-label="下へ落とす">▼</button>
          <button class="btn dir" id="btn-right" aria-label="右へ移動">▶</button>
        </div>
      </div>
      <div class="pad-group">
        <div class="pad-label">回転</div>
        <div class="pad-row">
          <button class="btn rot" id="btn-rotL" aria-label="左回転">↺</button>
          <button class="btn rot" id="btn-rotR" aria-label="右回転">↻</button>
        </div>
      </div>
    </div>
  </div>
  <div class="panel">
    <div class="stat">
      <div class="label">SCORE</div>
      <div class="value" id="score">0</div>
    </div>
    <div class="stat">
      <div class="label">CHAIN</div>
      <div class="value" id="chain">0</div>
    </div>
    <div class="speed">
      <div class="label">落下スピード</div>
      <div class="row">
        <span style="font-size:12px;color:#a99fd6">遅</span>
        <input type="range" id="speed" min="1" max="10" step="1" value="2">
        <span style="font-size:12px;color:#a99fd6">速</span>
        <span class="num" id="speed-num">2</span>
      </div>
    </div>
    <div class="colors">
      <div class="label">色の種類</div>
      <div class="seg" id="color-seg">
        <button type="button" class="seg-btn is-on" data-n="4">4色</button>
        <button type="button" class="seg-btn" data-n="5">5色</button>
      </div>
    </div>
    <label class="sound-toggle">
      <input type="checkbox" id="sound" checked>
      <span>サウンド</span>
    </label>
    <div class="keys">
      <b>A/D</b> 移動<br>
      <b>S</b> 高速落下<br>
      <b>←</b> 左回転<br>
      <b>→</b> 右回転
    </div>
    <button class="drawer-close" id="settings-close">閉じる</button>
  </div>
</div>
<div class="drawer-backdrop" id="drawer-backdrop"></div>

<script>
(() => {
  // --- 可視領域の高さを実測して CSS変数 --app-height に反映 ---
  // iOS の Safari/Chrome ではアドレスバーやツールバーの分だけ表示領域が縮むが、
  // CSS の svh/dvh だけでは取りこぼす場合があるため、実際の表示高さを測って使う。
  // visualViewport.height があればそれを最優先(ツールバー表示中の本当の可視高さ)。
  function setAppHeight() {
    // 実際に見える高さ。innerHeight と visualViewport.height の小さい方を採り、
    // ツールバー表示中でも確実に可視領域内に収める
    const vv = window.visualViewport ? window.visualViewport.height : Infinity;
    const h = Math.min(window.innerHeight || Infinity, vv);
    if (h && isFinite(h)) {
      document.documentElement.style.setProperty('--app-height', h + 'px');
    }
  }
  setAppHeight();
  window.addEventListener('resize', setAppHeight);
  window.addEventListener('orientationchange', () => setTimeout(setAppHeight, 300));
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', setAppHeight);
    window.visualViewport.addEventListener('scroll', setAppHeight);
  }

  const COLS = 6, ROWS = 12, CELL = 44;
  const HIDDEN = 2;            // 画面の上に隠れた控え行。ここまで積み切るとゲームオーバー
  const TOTAL = ROWS + HIDDEN; // 盤面配列の総行数(見える12行 + 見えない2行)
  const COLORS = ['#e63a2b', '#54b22e', '#2f7fd0', '#f7c01a', '#9d55d4']; // 赤緑青黄紫(本家バッジの色に合わせる)
  const EDGE   = ['#9c1d14', '#2c7a1b', '#1a4f93', '#cf9400', '#65299c'];

  // 本家ぷよぷよの公式アート風に、色ごとに「形」と「顔」を作り分けて描く
  // 緑/青=おなじみの白い二山フェイス, 赤=怒り目, 紫=眠そうな目, 黄=しずく型
  const SHAPE = ['blob', 'horns', 'bubble', 'drop', 'blob']; // 赤緑青黄紫(緑はツノ2本で赤と区別)
  const FACE_KIND = ['angry', 'classic', 'classic', 'happy', 'sleepy'];

  // 色ユーティリティ(白/黒と混ぜて明暗を作る)
  function _rgb(h) {
    h = h.replace('#', '');
    return [parseInt(h.slice(0, 2), 16), parseInt(h.slice(2, 4), 16), parseInt(h.slice(4, 6), 16)];
  }
  function mix(a, b, t) {
    const A = _rgb(a), B = _rgb(b);
    return `rgb(${Math.round(A[0] + (B[0] - A[0]) * t)},${Math.round(A[1] + (B[1] - A[1]) * t)},${Math.round(A[2] + (B[2] - A[2]) * t)})`;
  }
  const lighten = (c, t) => mix(c, '#ffffff', t);
  const darken = (c, t) => mix(c, '#000000', t);
  // 色(hex か rgb(...)) を不透明度つきの rgba に変換
  const _rgba = (c, a) => {
    let r, g, b;
    if (c[0] === '#') { [r, g, b] = _rgb(c); }
    else { [r, g, b] = c.match(/\d+/g).map(Number); }
    return `rgba(${r},${g},${b},${a})`;
  };

  const canvas = document.getElementById('board');
  const ctx = canvas.getContext('2d');
  const nextCanvas = document.getElementById('next');
  const nctx = nextCanvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const chainEl = document.getElementById('chain');
  const scoreElM = document.getElementById('score-m');   // スマホ用ヘッダー表示
  const chainElM = document.getElementById('chain-m');
  function showScore() { scoreEl.textContent = score; if (scoreElM) scoreElM.textContent = score; }
  function showChain(v) { chainEl.textContent = v; if (chainElM) chainElM.textContent = v; }
  const overlay = document.getElementById('overlay');
  const overlayTitle = document.getElementById('overlay-title');
  const overlaySub = document.getElementById('overlay-sub');

  // board[r][c] = color index, or null
  let board, piece, nextColors, score, maxChain, gameOver;
  let dropTimer = 0;
  let colorCount = 4;          // 使う色の種類数(4 or 5)。UIで切替
  let dropInterval = 650;      // 通常落下間隔(ms) ※スライダーで変更
  const SOFT_INTERVAL = 45;    // ↓押下中の落下間隔(ms)
  let softDrop = false;

  // 落下スピード スライダー(1=遅い 〜 10=速い)
  const SPEED_MS = [1000, 820, 680, 560, 460, 370, 290, 220, 160, 110];
  function applySpeed(level) {
    const lv = Math.min(10, Math.max(1, level | 0));
    dropInterval = SPEED_MS[lv - 1];
  }

  let paused = false;          // 設定ドロワーを開いている間はゲームを一時停止
  // 消去演出の状態
  let phase = 'play';          // 'play' | 'clear' | 'fall'
  let clearingList = [];       // 消去中のセル [{r,c}]
  let clearTimer = 0;          // 消去演出の経過(ms)
  let resolveChain = 0;        // 現在の連鎖数
  let particles = [];          // 弾けるパーティクル
  const CLEAR_DURATION = 480;  // 点滅〜ポップの基本長さ(ms)
  let clearDur = CLEAR_DURATION;  // 連鎖が進むほど「溜め」を長くする(段数で変化)
  let chainPopup = null;       // 連鎖数ポップ {n, t, x, y}
  const CHAIN_POPUP_DUR = 1100;
  // 本家ぷよぷよ通の連鎖ボイス(呪文)。show=画面表示, say=TTS読み上げ用, file=肉声mp3
  // file があればそれを最優先で再生し、無い/未配置なら say を TTS にフォールバック
  const CHAIN_SPELLS = [
    { show: 'ファイヤー',     say: 'ファイヤー',     file: 'voice/0.mp3' },
    { show: 'アイスストーム', say: 'アイスストーム', file: 'voice/1.mp3' },
    { show: 'ダイアキュート', say: 'ダイアキュート', file: 'voice/2.mp3' },
    { show: 'ブレインダムド', say: 'ブレインダムド', file: 'voice/3.mp3' },
    { show: 'ジュゲム',       say: 'ジュゲム',       file: 'voice/4.mp3' },
    { show: 'ミラクルボム',   say: 'ミラクルボム',   file: 'voice/5.mp3' },
    { show: 'バヨエ〜ン',     say: 'バヨエーン',     file: 'voice/6.mp3' },
  ];
  let chainVoice = null;       // 連鎖セリフのカットイン {text, t}
  const CHAIN_VOICE_DUR = 1300;
  let jaVoice = null;          // 日本語の音声合成ボイス(萌え・女性声を優先)
  // 女性・高品質な日本語ボイスを優先選択(萌え＆ノリの良い声を狙う)
  function pickJaVoice() {
    if (!('speechSynthesis' in window)) return;
    const vs = speechSynthesis.getVoices().filter((v) => /ja[-_]?JP|^ja$/i.test(v.lang) || /日本語/.test(v.name));
    if (!vs.length) { jaVoice = null; return; }
    // 名前から女性・かわいい系・高品質を点数化(男性声・ロボ声は減点)
    const FEMALE = /(google|kyoko|o-?ren|sayaka|haruka|nanami|mizuki|ayumi|female|女性|あおい|さくら|はるか|ナナミ|kore|aoede|sulafat)/i;
    const MALE = /(otoya|hattori|ichiro|male|男性|takeru)/i;
    const NICE = /(google|enhanced|premium|neural|natural|高品質|plus|siri)/i;
    const score = (v) => {
      let s = 0;
      if (FEMALE.test(v.name)) s += 10;
      if (MALE.test(v.name)) s -= 10;
      if (NICE.test(v.name)) s += 4;     // 自然な高品質声を優先
      if (/google/i.test(v.name)) s += 3; // Chromeの「Google 日本語」は特に自然
      return s;
    };
    jaVoice = vs.slice().sort((a, b) => score(b) - score(a))[0];
  }
  if ('speechSynthesis' in window) {
    pickJaVoice();
    speechSynthesis.onvoiceschanged = pickJaVoice;
  }
  // ---- 連鎖ボイス(肉声mp3 を最優先、無ければ TTS フォールバック) ----
  const voiceBuffers = new Array(CHAIN_SPELLS.length).fill(null); // 復号済み AudioBuffer
  let voiceLoadStarted = false;
  let voiceSource = null;        // 現在鳴っている肉声ボイス(打ち切り用)
  // mp3 を取得して AudioBuffer に復号(未配置の 404 は無視して TTS にフォールバック)
  function loadVoices() {
    if (voiceLoadStarted || !audioCtx) return;
    voiceLoadStarted = true;
    CHAIN_SPELLS.forEach((spell, i) => {
      if (!spell.file) return;
      fetch(spell.file)
        .then((r) => { if (!r.ok) throw new Error('no voice file'); return r.arrayBuffer(); })

    for (const { r, c } of clearingList) {
      emitPop(r, c, board[r][c], resolveChain);   // 弾けるパーティクル(連鎖で量・勢い増)
      board[r][c] = null;
    }
    clearingList = [];
    beginFall(() => nextClearStep());   // 消えた後の落下も「ためて落ちる」
  }

  // ---- パーティクル(消える瞬間の演出) ----
  function emitPop(r, c, colorIdx, chain) {
    chain = chain || 1;
    const boost = 1 + Math.min(chain, 8) * 0.14;     // 連鎖が大きいほど勢いを増す
    const cx = c * CELL + CELL / 2, cy = r * CELL + CELL / 2;
    const n = 12 + Math.min(chain, 8) * 3;           // 連鎖が大きいほど粒も多く
    for (let i = 0; i < n; i++) {
      const a = (Math.PI * 2 * i / n) + Math.random() * 0.5;
      const sp = (1.8 + Math.random() * 3.6) * boost;
      const star = Math.random() < 0.45;       // 一部はキラキラ星
      particles.push({
        x: cx, y: cy,
        vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp - 1.5,
        life: 1,
        decay: 0.03 + Math.random() * 0.03,
        size: (star ? 3 : 2) + Math.random() * 3,
        color: Math.random() < 0.5 ? '#fff' : COLORS[colorIdx],
        star,
        spin: Math.random() * Math.PI,
        vspin: (Math.random() - 0.5) * 0.4,
      });
    }
  }

  function updateParticles(dt) {
    const f = dt / 16;
    for (const p of particles) {
      p.x += p.vx * f;
      p.y += p.vy * f;
      p.vy += 0.2 * f;     // 重力
      p.vx *= Math.pow(0.96, f);  // 空気抵抗でふわっと
      p.spin += (p.vspin || 0) * f;
      p.life -= (p.decay || 0.05) * f;
    }
    particles = particles.filter((p) => p.life > 0);
  }

  function drawStar(g, x, y, outer, inner, points, rot) {
    g.beginPath();
    for (let i = 0; i < points * 2; i++) {
      const rad = i % 2 === 0 ? outer : inner;
      const a = rot + Math.PI * i / points;
      const px = x + Math.cos(a) * rad, py = y + Math.sin(a) * rad;
      i === 0 ? g.moveTo(px, py) : g.lineTo(px, py);
    }
    g.closePath();
    g.fill();
  }

  function drawParticles(g) {
    for (const p of particles) {
      g.save();
      g.globalAlpha = Math.max(0, p.life);
      g.globalCompositeOperation = 'lighter';   // 光って見える
      g.shadowColor = p.color;
      g.shadowBlur = 8;
      g.fillStyle = p.color;
      if (p.star) {
        drawStar(g, p.x, p.y, p.size * 1.7, p.size * 0.72, 4, p.spin);
      } else {
        g.beginPath();
        g.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        g.fill();
      }
      g.restore();
    }
  }

  // ---- 衝撃波リング ----
  function updateShockwaves(dt) {
    for (const s of shockwaves) s.t += dt;
    shockwaves = shockwaves.filter((s) => s.t < (s.delay || 0) + s.dur);
  }

  function drawShockwaves(g) {
    for (const s of shockwaves) {
      const te = s.t - (s.delay || 0);             // 時間差ぶんを引く
      if (te < 0) continue;                        // まだ発生前
      const p = te / s.dur;                        // 0..1
      const rad = s.max * (0.18 + 0.82 * (1 - Math.pow(1 - p, 2)));
      g.save();
      g.globalCompositeOperation = 'lighter';
      g.shadowColor = s.hue;
      g.shadowBlur = CELL * 0.4 * (1 - p);
      // 外側のリング(太め)
      g.globalAlpha = (1 - p) * 0.7;
      g.lineWidth = Math.max(1, CELL * 0.26 * (1 - p));
      g.strokeStyle = s.hue;
      g.beginPath();
      g.arc(s.x, s.y, rad, 0, Math.PI * 2);
      g.stroke();
      // 内側のやわらかい光
      g.shadowBlur = 0;
      g.globalAlpha = (1 - p) * 0.18;
      g.beginPath();
      g.arc(s.x, s.y, rad * 0.7, 0, Math.PI * 2);
      g.fillStyle = s.hue;
      g.fill();
      g.restore();
    }
  }

  function spawnNext() {
    piece = newPiece();
    // 出現位置が埋まっていたらゲームオーバー
    if (!valid(piece)) {
      gameOver = true;
      endGame();
    }
    drawNext();
  }

  function endGame() {
    piece = null;
    overlayTitle.textContent = 'GAME OVER';
    overlaySub.textContent = `スコア ${score} / 最大 ${maxChain} 連鎖`;
    overlay.classList.add('show');
    stopBGM();   // ゲームオーバーで音楽を止める
  }

  // ---- 描画 ----

  // ---- ぷよ本体の形（色ごとに違うシルエット） ----
  function bodyPath(g, type, cx, cy, R) {
    g.beginPath();
    if (type === 'drop') {
      // しずく型（上がとがる）= 黄
      const top = cy - R * 1.42;
      g.moveTo(cx, top);
      g.bezierCurveTo(cx + R * 0.50, top + R * 0.78, cx + R * 1.02, cy - R * 0.18, cx + R * 1.02, cy + R * 0.20);
      g.bezierCurveTo(cx + R * 1.02, cy + R * 1.02, cx + R * 0.56, cy + R * 1.18, cx, cy + R * 1.18);
      g.bezierCurveTo(cx - R * 0.56, cy + R * 1.18, cx - R * 1.02, cy + R * 1.02, cx - R * 1.02, cy + R * 0.20);
      g.bezierCurveTo(cx - R * 1.02, cy - R * 0.18, cx - R * 0.50, top + R * 0.78, cx, top);
    } else if (type === 'horns') {
      // 上に2本のツノが生えた形(本家の緑ぷよ風) = 緑
      g.moveTo(cx - R, cy);
      // 左外周 → 左ツノの先端
      g.bezierCurveTo(cx - R * 1.0, cy - R * 0.62, cx - R * 0.88, cy - R * 0.96, cx - R * 0.52, cy - R * 1.50);
      // 先端 → 中央の谷
      g.bezierCurveTo(cx - R * 0.40, cy - R * 1.16, cx - R * 0.24, cy - R * 1.02, cx, cy - R * 1.00);
      // 谷 → 右ツノの先端
      g.bezierCurveTo(cx + R * 0.24, cy - R * 1.02, cx + R * 0.40, cy - R * 1.16, cx + R * 0.52, cy - R * 1.50);
      // 先端 → 右外周
      g.bezierCurveTo(cx + R * 0.88, cy - R * 0.96, cx + R * 1.0, cy - R * 0.62, cx + R, cy);
      // 下まわりは blob と同じ(足2つ)
      g.bezierCurveTo(cx + R, cy + R * 0.56, cx + R * 0.96, cy + R * 0.82, cx + R * 0.56, cy + R * 0.94);
      g.bezierCurveTo(cx + R * 0.80, cy + R * 1.08, cx + R * 0.50, cy + R * 1.16, cx + R * 0.30, cy + R * 0.98);
      g.bezierCurveTo(cx + R * 0.13, cy + R * 0.90, cx - R * 0.13, cy + R * 0.90, cx - R * 0.30, cy + R * 0.98);
      g.bezierCurveTo(cx - R * 0.50, cy + R * 1.16, cx - R * 0.80, cy + R * 1.08, cx - R * 0.56, cy + R * 0.94);
      g.bezierCurveTo(cx - R * 0.96, cy + R * 0.82, cx - R, cy + R * 0.56, cx - R, cy);
    } else if (type === 'bubble') {
      // 吹き出し型（右下にしっぽ）= 青
      g.moveTo(cx - R, cy);
      g.bezierCurveTo(cx - R, cy - R * 1.28, cx + R, cy - R * 1.28, cx + R, cy);
      g.bezierCurveTo(cx + R, cy + R * 0.44, cx + R * 0.92, cy + R * 0.70, cx + R * 0.70, cy + R * 0.86);
      g.lineTo(cx + R * 1.06, cy + R * 1.30);            // しっぽの先
      g.bezierCurveTo(cx + R * 0.48, cy + R * 1.06, cx + R * 0.20, cy + R * 1.02, cx - R * 0.02, cy + R * 1.0);
      g.bezierCurveTo(cx - R * 0.60, cy + R * 0.96, cx - R, cy + R * 0.52, cx - R, cy);
    } else {
      // ぷよ型の丸い体＋下に小さな足2つ = 赤/緑/紫
      g.moveTo(cx - R, cy);
      g.bezierCurveTo(cx - R, cy - R * 1.28, cx + R, cy - R * 1.28, cx + R, cy);
      g.bezierCurveTo(cx + R, cy + R * 0.56, cx + R * 0.96, cy + R * 0.82, cx + R * 0.56, cy + R * 0.94);
      g.bezierCurveTo(cx + R * 0.80, cy + R * 1.08, cx + R * 0.50, cy + R * 1.16, cx + R * 0.30, cy + R * 0.98);
      g.bezierCurveTo(cx + R * 0.13, cy + R * 0.90, cx - R * 0.13, cy + R * 0.90, cx - R * 0.30, cy + R * 0.98);
      g.bezierCurveTo(cx - R * 0.50, cy + R * 1.16, cx - R * 0.80, cy + R * 1.08, cx - R * 0.56, cy + R * 0.94);
      g.bezierCurveTo(cx - R * 0.96, cy + R * 0.82, cx - R, cy + R * 0.56, cx - R, cy);
    }
    g.closePath();
  }

  // 公式の「白い炎型の目」を左右に1対描く（緑・青・黄のおなじみフェイス）
  // sep=中心からの距離, w=半幅, h=高さ, by=底のy, flick=上端が外へ跳ねる量
  // 黒目（瞳）を必ず入れて「目がある」印象にする
  function whiteEyes(g, cx, ey, R, sep, w, h, by, flick) {
    for (const s of [-1, 1]) {
      const dx = cx + s * sep;
      const topY = by - h;
      const ptX = dx + s * flick;            // 上端（外側へ跳ねる）
      g.beginPath();
      g.moveTo(dx - s * w * 0.45, by - h * 0.04);                          // 内側の底
      g.bezierCurveTo(dx - s * w * 0.15, by + h * 0.14,                    // 底をまわって
                      dx + s * w * 0.85, by + h * 0.06,
                      dx + s * w * 1.02, by - h * 0.30);                   // 外側のふくらみ
      g.bezierCurveTo(dx + s * w * 1.04, topY + h * 0.34,                  // 外側を上へ
                      dx + s * (w * 0.46 + flick), topY - h * 0.02,
                      ptX, topY);                                          // 先端へ
      g.bezierCurveTo(dx - s * w * 0.16, topY + h * 0.16,                  // 内側を下る
                      dx - s * w * 0.58, by - h * 0.52,
                      dx - s * w * 0.45, by - h * 0.04);
      g.closePath();
      g.fillStyle = '#fff';
      g.fill();
      g.lineWidth = R * 0.045;
      g.strokeStyle = 'rgba(20,40,60,0.22)';
      g.stroke();

      // 黒目（瞳）— 白目の下のほう・やや内寄りに置く
      const pr = w * 0.46;                       // 瞳の半径
      const px = dx + s * w * 0.04;              // ほんの少し内側
      const py = by - h * 0.30;                  // 下寄り
      g.beginPath();
      g.ellipse(px, py, pr, pr * 1.12, 0, 0, Math.PI * 2);
      g.fillStyle = '#241c28';
      g.fill();
      // キャッチライト（白い反射）
      g.beginPath();
      g.arc(px - s * pr * 0.34, py - pr * 0.42, pr * 0.34, 0, Math.PI * 2);
      g.fillStyle = 'rgba(255,255,255,0.95)';
      g.fill();
    }
  }

  // 顔（公式アート風の表情）
  function drawFaceKind(g, kind, cx, cy, R, colorIdx) {
    const ey = cy - R * 0.04;
    const dark = darken(COLORS[colorIdx], 0.55);
    g.lineCap = 'round';
    g.lineJoin = 'round';

    if (kind === 'classic') {
      // 緑・青: 大きく背の高い炎型の白目（先端が外へ跳ねる）
      whiteEyes(g, cx, ey, R, R * 0.44, R * 0.40, R * 0.96, cy + R * 0.42, R * 0.20);
      return;
    }

    if (kind === 'happy') {
      // 黄: 丸めで少し低い白目（かわいい印象）
      whiteEyes(g, cx, ey, R, R * 0.40, R * 0.40, R * 0.74, cy + R * 0.30, R * 0.06);
      return;
    }

    if (kind === 'angry') {
      // 赤: 白目＋黒目のちゃんとした目に、つり上がった眉で「怒り」を表現
      const off = R * 0.46;
      const eyc = ey + R * 0.12;
      for (const s of [-1, 1]) {
        const ex = cx + s * off;
        // 白目（縦長のたまご型）
        g.beginPath();
        g.ellipse(ex, eyc, R * 0.30, R * 0.40, 0, 0, Math.PI * 2);
        g.fillStyle = '#fff';
        g.fill();
        g.lineWidth = R * 0.045;
        g.strokeStyle = 'rgba(20,40,60,0.22)';
        g.stroke();
        // 黒目（内寄り・下寄りで にらむ感じ）
        const px = ex - s * R * 0.05, py = eyc + R * 0.08;
        g.beginPath();
        g.ellipse(px, py, R * 0.16, R * 0.19, 0, 0, Math.PI * 2);
        g.fillStyle = '#241c28';
        g.fill();
        g.beginPath();
        g.arc(px - s * R * 0.06, py - R * 0.08, R * 0.06, 0, Math.PI * 2);
        g.fillStyle = 'rgba(255,255,255,0.95)';
        g.fill();
        // つり上がった眉（怒り）
        g.beginPath();
        g.moveTo(ex - s * R * 0.30, eyc - R * 0.36);
        g.lineTo(ex + s * R * 0.30, eyc - R * 0.62);
        g.lineWidth = R * 0.16;
        g.strokeStyle = dark;
        g.lineCap = 'round';
        g.stroke();
      }
      return;
    }

    if (kind === 'sleepy') {
      // 紫: 眠そうな半目（重く垂れたまぶた＋下からのぞく目）
      const off = R * 0.42;
      for (const s of [-1, 1]) {
        const ex = cx + s * off;
        const eyc = ey + R * 0.18;
        // 白目
        g.beginPath();
        g.ellipse(ex, eyc, R * 0.34, R * 0.32, 0, 0, Math.PI * 2);
        g.fillStyle = '#fff';
        g.fill();
        // 黒目（下寄り）
        g.beginPath();
        g.arc(ex, eyc + R * 0.10, R * 0.16, 0, Math.PI * 2);
        g.fillStyle = dark;
        g.fill();
        g.beginPath();
        g.arc(ex - R * 0.05, eyc + R * 0.03, R * 0.05, 0, Math.PI * 2);
        g.fillStyle = 'rgba(255,255,255,0.92)';
        g.fill();
        // 重いまぶた（外側が下がる＝眠そう）。目の上2/3を覆う
        const innerX = ex - s * R * 0.42, outerX = ex + s * R * 0.42;
        const innerY = eyc - R * 0.06, outerY = eyc + R * 0.13;
        g.beginPath();
        g.moveTo(innerX, innerY);
        g.bezierCurveTo(innerX, eyc - R * 0.42, outerX, eyc - R * 0.42, outerX, outerY);
        g.quadraticCurveTo(ex, eyc + R * 0.02, innerX, innerY);
        g.closePath();
        g.fillStyle = darken(COLORS[colorIdx], 0.32);
        g.fill();
      }
      return;
    }
  }

  // ぷよ1個をツヤツヤに描く（色ごとに形・顔が変わる）
  function drawPuyoChar(g, x, y, colorIdx, mergeUp) {
    const cx = x + CELL / 2;
    const cy = y + CELL * 0.50;
    const R = CELL * 0.40;
    // 上に同色がつながっている時はツノを引っ込めて丸くなる(連結が途切れて見えないように)
    let type = SHAPE[colorIdx];
    if (mergeUp && type === 'horns') type = 'blob';

    // 本体（放射グラデで球のツヤ）＋落ち影
    g.save();
    g.shadowColor = 'rgba(0,0,0,0.28)';
    g.shadowBlur = CELL * 0.13;
    g.shadowOffsetY = CELL * 0.07;
    bodyPath(g, type, cx, cy, R);
    // 光源を左上に置いた放射グラデ：中心が明るく、外周ほど濃くして球の丸みを強調
    const grad = g.createRadialGradient(cx - R * 0.40, cy - R * 0.54, R * 0.06, cx - R * 0.04, cy + R * 0.18, R * 1.42);
    grad.addColorStop(0,    lighten(COLORS[colorIdx], 0.72));
    grad.addColorStop(0.30, lighten(COLORS[colorIdx], 0.18));
    grad.addColorStop(0.62, COLORS[colorIdx]);
    grad.addColorStop(0.86, darken(EDGE[colorIdx], 0.04));
    grad.addColorStop(1,    darken(EDGE[colorIdx], 0.22));
    g.fillStyle = grad;
    g.fill();
    g.restore();

    // ハイライト類（本体内にクリップ）
    g.save();
    bodyPath(g, type, cx, cy, R);
    g.clip();

    // 内側のリム影（外周をぐるりと暗くして“球”の立体感を出す）
    const rim = g.createRadialGradient(cx, cy + R * 0.06, R * 0.62, cx, cy + R * 0.06, R * 1.12);
    rim.addColorStop(0, 'rgba(0,0,0,0)');
    rim.addColorStop(0.78, 'rgba(0,0,0,0)');
    rim.addColorStop(1, 'rgba(0,0,0,0.30)');
    g.fillStyle = rim;
    g.fillRect(cx - R * 1.6, cy - R * 1.6, R * 3.2, R * 3.2);

    // 下からの照り返し（色味のサブサーフェス光）でぷるんと感
    g.beginPath();
    g.ellipse(cx, cy + R * 0.66, R * 0.70, R * 0.40, 0, 0, Math.PI * 2);
    const sss = g.createRadialGradient(cx, cy + R * 0.66, R * 0.04, cx, cy + R * 0.66, R * 0.72);
    sss.addColorStop(0, _rgba(lighten(COLORS[colorIdx], 0.55), 0.55));
    sss.addColorStop(1, _rgba(lighten(COLORS[colorIdx], 0.55), 0));
    g.fillStyle = sss;
    g.fill();

    // 大きな上のツヤ（やわらかいグロス帯）
    g.beginPath();
    g.ellipse(cx - R * 0.28, cy - R * 0.50, R * 0.56, R * 0.40, -0.5, 0, Math.PI * 2);
    const gloss = g.createRadialGradient(cx - R * 0.34, cy - R * 0.58, R * 0.04, cx - R * 0.28, cy - R * 0.50, R * 0.58);
    gloss.addColorStop(0, 'rgba(255,255,255,0.85)');
    gloss.addColorStop(1, 'rgba(255,255,255,0)');
    g.fillStyle = gloss;
    g.fill();

    // 鋭いスペキュラの点（つやの芯）
    g.beginPath();
    g.ellipse(cx - R * 0.44, cy - R * 0.62, R * 0.17, R * 0.12, -0.4, 0, Math.PI * 2);
    g.fillStyle = 'rgba(255,255,255,0.98)';
    g.fill();
    // 小さな2つ目のキラリ
    g.beginPath();
    g.ellipse(cx - R * 0.12, cy - R * 0.40, R * 0.07, R * 0.05, -0.4, 0, Math.PI * 2);
    g.fillStyle = 'rgba(255,255,255,0.85)';
    g.fill();

    g.restore();

    // 輪郭
    bodyPath(g, type, cx, cy, R);
    g.lineWidth = CELL * 0.03;
    g.strokeStyle = darken(EDGE[colorIdx], 0.12);
    g.stroke();

    // 顔
    drawFaceKind(g, FACE_KIND[colorIdx], cx, cy, R, colorIdx);
  }

  // ぷよを描く(本家アート風の手描き)
  function drawPuyo(g, x, y, colorIdx, mergeUp) {
    drawPuyoChar(g, x, y, colorIdx, mergeUp);
  }

  function roundRectPath(g, x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    g.beginPath();
    g.moveTo(x + r, y);
    g.arcTo(x + w, y, x + w, y + h, r);
    g.arcTo(x + w, y + h, x, y + h, r);
    g.arcTo(x, y + h, x, y, r);
    g.arcTo(x, y, x + w, y, r);
    g.closePath();
  }

  // 同色のぷよ本体色の縦グラデ(上が明るく下が暗い、スプライトの陰影に合わせる)
  function bodyGrad(g, col, top, bottom) {
    const grad = g.createLinearGradient(0, top, 0, bottom);
    grad.addColorStop(0, lighten(COLORS[col], 0.34));
    grad.addColorStop(0.5, COLORS[col]);
    grad.addColorStop(1, EDGE[col]);
    return grad;
  }

  // 隣り合う同色ぷよの「すき間」を本体色で埋めて、くっついて見せる(スプライトの下に描く)
  function drawConnectors(g, colorAt) {
    for (let r = 0; r < TOTAL; r++) {
      for (let c = 0; c < COLS; c++) {
        const col = colorAt(r, c);
        if (col === null || col === undefined) continue;
        // 右隣
        if (c + 1 < COLS && colorAt(r, c + 1) === col) {
          const cx = (c + 1) * CELL, cy = (r + 0.5) * CELL;
          const w = CELL * 0.92, h = CELL * 0.66;
          g.fillStyle = bodyGrad(g, col, cy - h / 2, cy + h / 2);
          roundRectPath(g, cx - w / 2, cy - h / 2, w, h, CELL * 0.2);
          g.fill();
        }
        // 下隣
        if (r + 1 < TOTAL && colorAt(r + 1, c) === col) {
          const cx = (c + 0.5) * CELL, cy = (r + 1) * CELL;
          const w = CELL * 0.66, h = CELL * 0.92;
          g.fillStyle = bodyGrad(g, col, cy - h / 2, cy + h / 2);
          roundRectPath(g, cx - w / 2, cy - h / 2, w, h, CELL * 0.2);
          g.fill();
        }
      }
    }
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    // 画面シェイク(連鎖の迫力)。盤面全体を小刻みに揺らす
    if (shakeT > 0) {
      const env = Math.min(1, shakeT / 160);          // 減衰
      const m = shakeMag * env;
      ctx.translate((Math.random() * 2 - 1) * m, (Math.random() * 2 - 1) * m);
    }
    // 盤面は上のHIDDEN行を画面外に隠す(見える12行ぶんだけ表示)
    ctx.translate(0, -HIDDEN * CELL);
    // グリッド線(見える領域: 盤面行 HIDDEN〜TOTAL)
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.lineWidth = 1;
    for (let c = 1; c < COLS; c++) {
      ctx.beginPath(); ctx.moveTo(c * CELL, HIDDEN * CELL); ctx.lineTo(c * CELL, TOTAL * CELL); ctx.stroke();
    }
    for (let r = HIDDEN + 1; r < TOTAL; r++) {
      ctx.beginPath(); ctx.moveTo(0, r * CELL); ctx.lineTo(COLS * CELL, r * CELL); ctx.stroke();
    }
    // ポップ(縮小)中の消去セルは色付き body を隠し、白いポップだけ見せる
    const popping = phase === 'clear' && clearTimer >= clearDur - 130;
    const popSet = new Set();
    if (popping) for (const { r, c } of clearingList) popSet.add(r * COLS + c);
    // 落下中は着地予定セルを盤面から隠し、落下ぷよを別途描く
    const falling = phase === 'fall' && fallingTargets;
    const hidden = (r, c) =>
      (popping && popSet.has(r * COLS + c)) ||
      (falling && fallingTargets.has(r * COLS + c));

    // 操作中ぷよを盤面に重ねた「色マップ」。これで同色判定して連結を描く
    const overlayCells = {};
    if (phase === 'play' && piece) {
      if (piece.row >= 0) overlayCells[piece.row * COLS + piece.col] = piece.axis;
      const chc = childCell(piece);
      if (chc.r >= 0) overlayCells[chc.r * COLS + chc.c] = piece.child;
    }
    const colorAt = (r, c) => {
      if (r < 0 || r >= TOTAL || c < 0 || c >= COLS) return null;
      const k = r * COLS + c;
      if (k in overlayCells) return overlayCells[k];
      if (hidden(r, c)) return null;
      return board[r][c];
    };
    // 同色の連結部分を先に塗る(スプライトの下地になる)
    drawConnectors(ctx, colorAt);

    // 固定ぷよ: 3Dモデル画像で描画(着地の揺れを反映)
    for (let r = 0; r < TOTAL; r++) {
      for (let c = 0; c < COLS; c++) {
        const col = board[r][c];
        if (col === null || hidden(r, c)) continue;
        withWobble(ctx, r, c, () => drawPuyo(ctx, c * CELL, r * CELL, col, colorAt(r - 1, c) === col));
      }
    }
    // 消去演出: 対象ぷよを白く点滅 → 終盤はポップ(縮小)
    if (phase === 'clear') {
      const t = clearTimer;
      const popStart = clearDur - 130;
      // 溜め演出: 中心に光が集まり、終盤ほど強く速く脈動する
      if (t < popStart) {
        const cp = Math.min(1, t / popStart);                 // 0..1 充電進捗
        const pulse = 0.5 + 0.5 * Math.sin(t / (60 - cp * 38)); // 終盤ほど速い鼓動
        // 中心の集光グロー(だんだん大きく明るく)
        const R = CELL * (1.2 + 3.4 * cp);
        const grd = ctx.createRadialGradient(chargeX, chargeY, 0, chargeX, chargeY, R);
        grd.addColorStop(0, chargeHue);
        grd.addColorStop(1, _rgba(chargeHue, 0));
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ctx.globalAlpha = (0.10 + 0.5 * cp) * (0.55 + 0.45 * pulse);
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.arc(chargeX, chargeY, R, 0, Math.PI * 2);
        ctx.fill();
        // 収束リング(外から中心へ縮んで「溜め」を見せる)
        ctx.globalAlpha = 0.4 * cp;
        ctx.lineWidth = CELL * 0.14;
        ctx.strokeStyle = chargeHue;
        ctx.shadowColor = chargeHue;
        ctx.shadowBlur = CELL * 0.5;
        const cr = CELL * (5.0 * (1 - cp) + 0.6);
        ctx.beginPath();
        ctx.arc(chargeX, chargeY, cr, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }
      for (const { r, c } of clearingList) {
        const x = c * CELL, y = r * CELL;
        if (t < popStart) {
          // 点滅(白くフラッシュ)。終盤ほど点滅を速く
          const speed = t > popStart - 160 ? 45 : 80;
          if (Math.floor(t / speed) % 2 === 1) {
            ctx.save();
            ctx.globalAlpha = 0.55;
            ctx.globalCompositeOperation = 'lighter';
            ctx.beginPath();
            ctx.arc(x + CELL / 2, y + CELL / 2, CELL * 0.46, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
            ctx.restore();
          }
        } else {
          // ポップ: 白い円が縮みながら消える
          const p = (t - popStart) / 130; // 0..1
          ctx.save();
          ctx.globalAlpha = 1 - p;
          ctx.beginPath();
          ctx.arc(x + CELL / 2, y + CELL / 2, Math.max(0, CELL * 0.44 * (1 - p)), 0, Math.PI * 2);
          ctx.fillStyle = '#fff';
          ctx.fill();
          ctx.restore();
        }
      }
    }

    // 落下(重力)アニメ中のぷよ: 補間位置に独立して描く
    if (falling) {
      for (const f of fallingList) {
        const yr = (f.cur === undefined ? f.fromRow : f.cur);
        drawPuyo(ctx, f.col * CELL, yr * CELL, f.color);
      }
    }

    // 操作中のぷよ(落下中は独立して表示)
    if (piece) {
      if (piece.row >= 0) {
        drawPuyo(ctx, piece.col * CELL, piece.row * CELL, piece.axis,
                 colorAt(piece.row - 1, piece.col) === piece.axis);
      }
      const ch = childCell(piece);
      if (ch.r >= 0) {
        drawPuyo(ctx, ch.c * CELL, ch.r * CELL, piece.child,
                 colorAt(ch.r - 1, ch.c) === piece.child);
      }
    }

    // 衝撃波リング(連鎖の爆発感)
    drawShockwaves(ctx);

    // パーティクル(消える瞬間のキラッと弾ける演出)
    drawParticles(ctx);

    // 連鎖カウント演出
    drawChainPopup(ctx);

    // 連鎖ボイス(本家風のセリフ・カットイン)
    drawChainVoice(ctx);

    ctx.restore();   // シェイク用 translate を解除

    // 全消しバナー(画面座標で中央に表示)
    drawZenkeshi(ctx);

    // 画面フラッシュ(シェイクの影響を受けず全面を覆う)
    if (flash) {
      const fp = flash.t / flash.dur;
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.globalAlpha = flash.alpha * (1 - fp);
      ctx.fillStyle = flash.hue;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.restore();
    }
  }

  // 連鎖数のポップ表示(本家風に「N連鎖!」が弾んで浮かび上がる)
  const CHAIN_HUES = ['#ffe14a', '#ffb24a', '#ff7a4a', '#ff4a8c', '#c46bff', '#5a9bff'];
  function drawChainPopup(g) {
    if (!chainPopup) return;
    const p = chainPopup.t / CHAIN_POPUP_DUR;       // 0..1
    // 出だしは弾むように拡大、終盤で上に浮きながらフェード
    const pop = p < 0.25
      ? 1.25 * (1 - Math.pow(1 - p / 0.25, 3))      // ぴょこっと拡大(オーバーシュート気味)
      : 1.25 - 0.08 * Math.sin((p - 0.25) / 0.75 * Math.PI);
    const rise = p < 0.25 ? 0 : -(p - 0.25) / 0.75 * (CELL * 0.9);
    const alpha = p < 0.7 ? 1 : Math.max(0, 1 - (p - 0.7) / 0.3);
    const x = Math.max(CELL * 0.9, Math.min(canvas.width - CELL * 0.9, chainPopup.x));
    const y = chainPopup.y + rise;
    const col = CHAIN_HUES[Math.min(chainPopup.n - 2, CHAIN_HUES.length - 1)];
    const big = 1 + Math.min(chainPopup.n - 2, 8) * 0.07;   // 連鎖が大きいほど文字も大きく

    g.save();
    g.globalAlpha = alpha;
    g.translate(x, y);
    g.scale(pop * big, pop * big);
    g.shadowColor = col;          // 光るふちどり
    g.shadowBlur = 14;
    g.textAlign = 'center';
    g.textBaseline = 'middle';
    g.font = 'bold 30px "Hiragino Maru Gothic ProN", "Yu Gothic", system-ui, sans-serif';
    // 数字を大きく、「連鎖」を小さく
    const num = String(chainPopup.n);
    g.font = 'bold 38px "Hiragino Maru Gothic ProN", "Yu Gothic", system-ui, sans-serif';
    const numW = g.measureText(num).width;
    g.font = 'bold 20px "Hiragino Maru Gothic ProN", "Yu Gothic", system-ui, sans-serif';
    const tailW = g.measureText('連鎖').width;
    const total = numW + 4 + tailW;
    const startX = -total / 2;

    // 影
    g.lineJoin = 'round';
    // 数字
    g.font = 'bold 38px "Hiragino Maru Gothic ProN", "Yu Gothic", system-ui, sans-serif';
    g.lineWidth = 6; g.strokeStyle = 'rgba(0,0,0,0.55)';
    g.fillStyle = col;
    g.textAlign = 'left';
    g.strokeText(num, startX, 0);
    g.fillText(num, startX, 0);
    // 「連鎖」
    g.font = 'bold 20px "Hiragino Maru Gothic ProN", "Yu Gothic", system-ui, sans-serif';
    g.lineWidth = 5;
    g.fillStyle = '#fff';
    g.strokeText('連鎖', startX + numW + 4, 3);
    g.fillText('連鎖', startX + numW + 4, 3);
    g.restore();
  }

  // 連鎖ボイス(ファイヤー/アイスストーム…)を本家風カットインで表示
  function drawChainVoice(g) {
    if (!chainVoice) return;
    const p = chainVoice.t / CHAIN_VOICE_DUR;          // 0..1
    // 横からシュッと滑り込み→中央で弾み→最後にフェード
    const slide = p < 0.18 ? (1 - p / 0.18) * canvas.width * 0.6 : 0;
    const pop = p < 0.18
      ? 1
      : p < 0.32 ? 1 + 0.12 * Math.sin((p - 0.18) / 0.14 * Math.PI) : 1;
    const alpha = p < 0.78 ? 1 : Math.max(0, 1 - (p - 0.78) / 0.22);
    const tilt = -0.06;                                 // ちょい斜めで勢いを出す
    const cx = canvas.width / 2 + slide;
    // 盤面は HIDDEN 行ぶん上にずれた座標系で描かれるため、隠れ行を足して
    // 見える盤面の上部に収める(これを忘れると画面外に飛び出して隠れる)
    const cy = (HIDDEN + 1.5) * CELL;
    const txt = chainVoice.text;

    g.save();
    g.globalAlpha = alpha;
    g.translate(cx, cy);
    g.rotate(tilt);
    g.scale(pop, pop);
    g.textAlign = 'center';
    g.textBaseline = 'middle';
    g.font = '900 34px "Hiragino Maru Gothic ProN", "Yu Gothic", system-ui, sans-serif';
    const w = g.measureText(txt).width;
    // 背景の帯(虹色グラデで本家っぽく)
    const grad = g.createLinearGradient(-w / 2, 0, w / 2, 0);
    grad.addColorStop(0, '#ff4a8c');
    grad.addColorStop(0.5, '#ffd24a');
    grad.addColorStop(1, '#5a9bff');
    g.fillStyle = grad;
    g.globalAlpha = alpha * 0.9;
    const padX = 18, padY = 10, bw = w + padX * 2, bh = 34 + padY * 2;
    if (g.roundRect) { g.beginPath(); g.roundRect(-bw / 2, -bh / 2, bw, bh, 12); g.fill(); }
    else g.fillRect(-bw / 2, -bh / 2, bw, bh);
    g.globalAlpha = alpha;
    // 文字(白抜き＋濃いふちどり＋発光)
    g.lineJoin = 'round';
    g.shadowColor = 'rgba(255,255,255,0.9)';
    g.shadowBlur = 12;
    g.lineWidth = 7; g.strokeStyle = 'rgba(40,20,60,0.85)';
    g.strokeText(txt, 0, 1);
    g.shadowBlur = 0;
    g.fillStyle = '#fff';
    g.fillText(txt, 0, 1);
    g.restore();
  }

  // 「ぜんけし」バナー(本家風に1文字ずつ弾んで登場し、ぷかぷか浮かぶ)
  function drawZenkeshi(g) {
    if (!zenkeshiFx) return;
    const t = zenkeshiFx.t;
    const p = t / ZENKESHI_FX_DUR;
    const alpha = p < 0.78 ? 1 : Math.max(0, 1 - (p - 0.78) / 0.22);
    const chars = 'ぜんけし';
    const size = 46;
    const spacing = size * 1.06;
    const cx = canvas.width / 2;
    const cy = canvas.height / 2 - CELL * 0.6;
    const startX = cx - spacing * (chars.length - 1) / 2;
    g.save();
    g.globalAlpha = alpha;
    g.textAlign = 'center';
    g.textBaseline = 'middle';
    g.lineJoin = 'round';
    g.font = `bold ${size}px "Hiragino Maru Gothic ProN", "Yu Gothic", system-ui, sans-serif`;
    for (let i = 0; i < chars.length; i++) {
      const ct = t - i * 95;             // 1文字ずつ順に登場
      if (ct < 0) continue;
      const ap = Math.min(1, ct / 240);
      const s = 1.7 - 0.7 * (1 - Math.pow(1 - ap, 3));   // 大きく出てキュッと収まる
      const bob = Math.sin(ct / 280 + i * 0.9) * 4;       // ぷかぷか上下
      const col = CHAIN_HUES[i % CHAIN_HUES.length];
      g.save();
      g.globalAlpha = alpha * ap;
      g.translate(startX + spacing * i, cy + bob);
      g.scale(s, s);
      g.shadowColor = col;
      g.shadowBlur = 16;
      g.lineWidth = 7;
      g.strokeStyle = 'rgba(0,0,0,0.6)';
      g.strokeText(chars[i], 0, 0);
      g.fillStyle = col;
      g.fillText(chars[i], 0, 0);
      g.restore();
    }
    g.restore();
  }

  function drawNext() {
    nctx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
    if (!nextColors) return;
    const x = (nextCanvas.width - CELL) / 2;
    // 同色なら連結部分を先に塗る
    if (nextColors[0] === nextColors[1]) {
      const cx = x + CELL / 2, cy = 8 + CELL;
      const w = CELL * 0.66, h = CELL * 0.92;
      nctx.fillStyle = bodyGrad(nctx, nextColors[0], cy - h / 2, cy + h / 2);
      roundRectPath(nctx, cx - w / 2, cy - h / 2, w, h, CELL * 0.2);
      nctx.fill();
    }
    drawPuyo(nctx, x, 8, nextColors[0]);
    drawPuyo(nctx, x, 8 + CELL, nextColors[1], nextColors[0] === nextColors[1]);
  }

  // ---- ループ ----
  let last = performance.now();
  function loop(now) {
    const dt = now - last;
    last = now;
    // 一時停止中(設定ドロワー表示中)は時間を進めず、表示だけ維持する
    if (paused) { draw(); requestAnimationFrame(loop); return; }
    if (!gameOver) {
      if (phase === 'play' && piece) {
        dropTimer += dt;
        const interval = softDrop ? SOFT_INTERVAL : dropInterval;
        if (dropTimer >= interval) {
          dropTimer = 0;
          if (!stepDown()) {
            lockPiece();
          }
        }
      } else if (phase === 'fall') {
        updateFall(dt);
      } else if (phase === 'clear') {
        clearTimer += dt;
        if (clearTimer >= clearDur) {   // 溜め(clearDur)が終わったら消去・爆発
          finishClearStep();
        }
      }
    }
    updateParticles(dt);
    updateShockwaves(dt);
    if (shakeT > 0) shakeT -= dt;
    if (flash) { flash.t += dt; if (flash.t >= flash.dur) flash = null; }
    if (wobbleSet.size) {
      wobbleTimer += dt;
      if (wobbleTimer >= WOBBLE_DUR) wobbleSet = new Set();
    }
    if (chainPopup) {
      chainPopup.t += dt;
      if (chainPopup.t >= CHAIN_POPUP_DUR) chainPopup = null;
    }
    if (chainVoice) {
      chainVoice.t += dt;
      if (chainVoice.t >= CHAIN_VOICE_DUR) chainVoice = null;
    }
    if (zenkeshiFx) {
      zenkeshiFx.t += dt;
      if (zenkeshiFx.t >= ZENKESHI_FX_DUR) zenkeshiFx = null;
    }
    updateBGMTempo();   // ピンチで曲を速く・通常で元に戻す
    draw();
    requestAnimationFrame(loop);
  }

  // ---- キー ----
  document.addEventListener('keydown', (e) => {
    if (paused) return;   // 設定中(一時停止)は操作・BGM再開をしない
    ensureAudio();   // 最初のキー操作で音声を有効化(自動再生制限の解除)
    startBGM();      // 最初の操作でBGM開始
    if (gameOver) return;
    switch (e.key) {
      case 'a': case 'A':  move(-1); e.preventDefault(); break;   // A=左
      case 'd': case 'D':  move(1);  e.preventDefault(); break;   // D=右
      case 's': case 'S':  softDrop = true; e.preventDefault(); break; // S=落下
      case 'ArrowLeft':    rotate(-1); e.preventDefault(); break; // ←=左回転
      case 'ArrowRight':   rotate(1);  e.preventDefault(); break; // →=右回転
    }
  });
  document.addEventListener('keyup', (e) => {
    if (e.key === 's' || e.key === 'S') { softDrop = false; dropTimer = 0; }
  });
  document.getElementById('restart').addEventListener('click', reset);

  // ---- 画面上コントローラー(左手=移動 / 右手=回転) ----
  function bindPress(id, onDown, onUp, repeat) {
    const el = document.getElementById(id);
    if (!el) return;
    let timer = null;
    const stop = () => { if (timer) { clearInterval(timer); timer = null; } if (onUp) onUp(); };
    el.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      ensureAudio();
      startBGM();      // タップ操作でBGM開始
      if (gameOver) return;
      onDown();
      if (repeat) timer = setInterval(onDown, 110);
    });
    el.addEventListener('pointerup', stop);
    el.addEventListener('pointerleave', stop);
    el.addEventListener('pointercancel', stop);
    el.addEventListener('contextmenu', (e) => e.preventDefault());
  }
  bindPress('btn-left',  () => move(-1), null, true);
  bindPress('btn-right', () => move(1),  null, true);
  bindPress('btn-down',  () => { softDrop = true; }, () => { softDrop = false; dropTimer = 0; }, false);
  bindPress('btn-rotL',  () => rotate(-1), null, false);
  bindPress('btn-rotR',  () => rotate(1),  null, false);

  // 落下スピード スライダー
  const speedInput = document.getElementById('speed');
  const speedNum = document.getElementById('speed-num');
  applySpeed(parseInt(speedInput.value, 10));
  speedInput.addEventListener('input', () => {
    const lv = parseInt(speedInput.value, 10);
    applySpeed(lv);
    speedNum.textContent = lv;
  });

  // 色の種類 (4色 / 5色) 切替。変更したらゲームをリセットして反映
  const colorSeg = document.getElementById('color-seg');
  colorSeg.addEventListener('click', (e) => {
    const btn = e.target.closest('.seg-btn');
    if (!btn) return;
    const n = parseInt(btn.dataset.n, 10);
    if (n === colorCount) return;
    colorCount = n;
    for (const b of colorSeg.querySelectorAll('.seg-btn')) {
      b.classList.toggle('is-on', parseInt(b.dataset.n, 10) === colorCount);
    }
    reset();   // 盤面を作り直して新しい色数で開始
  });

  // サウンド ON/OFF
  const soundInput = document.getElementById('sound');
  soundInput.addEventListener('change', () => {
    soundOn = soundInput.checked;
    if (soundOn) { ensureAudio(); sMove(); startBGM(); }   // ONにした合図 + BGM再開
    else { stopBGM(); stopVoice(); }  // OFFでBGM・連鎖ボイス停止
  });

  // 設定ドロワー(スマホ): ギアで開閉。背景タップ・閉じるボタンで閉じる
  const panel = document.querySelector('.panel');
  const backdrop = document.getElementById('drawer-backdrop');
  function openDrawer() {
    panel.classList.add('open'); backdrop.classList.add('show');
    paused = true;            // 設定中はゲームを止める
    stopBGM();                // 音楽も止める
    stopVoice();              // 連鎖ボイスも止める
  }
  function closeDrawer() {
    panel.classList.remove('open'); backdrop.classList.remove('show');
    paused = false;           // 再開
    startBGM();               // 音楽も再開(サウンドONかつプレイ中のみ)
  }
  document.getElementById('settings-btn').addEventListener('click', openDrawer);
  document.getElementById('settings-close').addEventListener('click', closeDrawer);
  backdrop.addEventListener('click', closeDrawer);

  // スマホでページがスクロール・バウンドしないようにタッチ移動を抑止
  // (設定ドロワー内だけはスクロールを許可)
  document.addEventListener('touchmove', (e) => {
    if (!e.target.closest('.panel')) e.preventDefault();
  }, { passive: false });

  reset();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
