  function stopVoice() { if (voiceSource) { try { voiceSource.stop(); } catch (e) {} voiceSource = null; } if ('speechSynthesis' in window) speechSynthesis.cancel(); }
  // 呪文の音声を鳴らす(画面表示はフィールド側で行う)
  function playSpell(idx, chain) {
    if (!soundOn) return;
    if (audioCtx && voiceBuffers[idx]) {
      try {
        if (voiceSource) { try { voiceSource.stop(); } catch (e) {} }
        const src = audioCtx.createBufferSource(); src.buffer = voiceBuffers[idx];
        src.playbackRate.value = Math.min(1.18 + Math.min(chain - 1, 8) * 0.03, 1.42);
        const g = audioCtx.createGain(); g.gain.value = 1;
        src.connect(g).connect(audioCtx.destination);
        src.onended = () => { if (voiceSource === src) voiceSource = null; };
        voiceSource = src; src.start();
      } catch (e) {}
    }
    // mp3が未ロードのときは無音にする(機械音声=TTSには戻さない)。連鎖音(sPop)は別途鳴る
  }

  // ===== 純粋な描画ヘルパ(盤面に依存しない) =====


  function drawStar(g, x, y, outer, inner, points, rot) {
    g.beginPath();
    for (let i = 0; i < points * 2; i++) {
      const rad = i % 2 === 0 ? outer : inner;
      const a = rot + Math.PI * i / points;
      const px = x + Math.cos(a) * rad, py = y + Math.sin(a) * rad;
      i === 0 ? g.moveTo(px, py) : g.lineTo(px, py);
    }
    g.closePath();
    g.fill();
  }


  function bodyPath(g, type, cx, cy, R) {
    g.beginPath();
    if (type === 'drop') {
      // しずく型（上がとがる）= 黄
      const top = cy - R * 1.42;
      g.moveTo(cx, top);
      g.bezierCurveTo(cx + R * 0.50, top + R * 0.78, cx + R * 1.02, cy - R * 0.18, cx + R * 1.02, cy + R * 0.20);
      g.bezierCurveTo(cx + R * 1.02, cy + R * 1.02, cx + R * 0.56, cy + R * 1.18, cx, cy + R * 1.18);
      g.bezierCurveTo(cx - R * 0.56, cy + R * 1.18, cx - R * 1.02, cy + R * 1.02, cx - R * 1.02, cy + R * 0.20);
      g.bezierCurveTo(cx - R * 1.02, cy - R * 0.18, cx - R * 0.50, top + R * 0.78, cx, top);
    } else if (type === 'horns') {
      // 上に2本のツノが生えた形(本家の緑ぷよ風) = 緑
      g.moveTo(cx - R, cy);
      // 左外周 → 左ツノの先端
      g.bezierCurveTo(cx - R * 1.0, cy - R * 0.62, cx - R * 0.88, cy - R * 0.96, cx - R * 0.52, cy - R * 1.50);
      // 先端 → 中央の谷
      g.bezierCurveTo(cx - R * 0.40, cy - R * 1.16, cx - R * 0.24, cy - R * 1.02, cx, cy - R * 1.00);
      // 谷 → 右ツノの先端
      g.bezierCurveTo(cx + R * 0.24, cy - R * 1.02, cx + R * 0.40, cy - R * 1.16, cx + R * 0.52, cy - R * 1.50);
      // 先端 → 右外周
      g.bezierCurveTo(cx + R * 0.88, cy - R * 0.96, cx + R * 1.0, cy - R * 0.62, cx + R, cy);
      // 下まわりは blob と同じ(足2つ)
      g.bezierCurveTo(cx + R, cy + R * 0.56, cx + R * 0.96, cy + R * 0.82, cx + R * 0.56, cy + R * 0.94);
      g.bezierCurveTo(cx + R * 0.80, cy + R * 1.08, cx + R * 0.50, cy + R * 1.16, cx + R * 0.30, cy + R * 0.98);
      g.bezierCurveTo(cx + R * 0.13, cy + R * 0.90, cx - R * 0.13, cy + R * 0.90, cx - R * 0.30, cy + R * 0.98);
      g.bezierCurveTo(cx - R * 0.50, cy + R * 1.16, cx - R * 0.80, cy + R * 1.08, cx - R * 0.56, cy + R * 0.94);
      g.bezierCurveTo(cx - R * 0.96, cy + R * 0.82, cx - R, cy + R * 0.56, cx - R, cy);
    } else if (type === 'bubble') {
      // 吹き出し型（右下にしっぽ）= 青
      g.moveTo(cx - R, cy);
      g.bezierCurveTo(cx - R, cy - R * 1.28, cx + R, cy - R * 1.28, cx + R, cy);
      g.bezierCurveTo(cx + R, cy + R * 0.44, cx + R * 0.92, cy + R * 0.70, cx + R * 0.70, cy + R * 0.86);
      g.lineTo(cx + R * 1.06, cy + R * 1.30);            // しっぽの先
      g.bezierCurveTo(cx + R * 0.48, cy + R * 1.06, cx + R * 0.20, cy + R * 1.02, cx - R * 0.02, cy + R * 1.0);
      g.bezierCurveTo(cx - R * 0.60, cy + R * 0.96, cx - R, cy + R * 0.52, cx - R, cy);
    } else {
      // ぷよ型の丸い体＋下に小さな足2つ = 赤/緑/紫
      g.moveTo(cx - R, cy);
      g.bezierCurveTo(cx - R, cy - R * 1.28, cx + R, cy - R * 1.28, cx + R, cy);
      g.bezierCurveTo(cx + R, cy + R * 0.56, cx + R * 0.96, cy + R * 0.82, cx + R * 0.56, cy + R * 0.94);
      g.bezierCurveTo(cx + R * 0.80, cy + R * 1.08, cx + R * 0.50, cy + R * 1.16, cx + R * 0.30, cy + R * 0.98);
      g.bezierCurveTo(cx + R * 0.13, cy + R * 0.90, cx - R * 0.13, cy + R * 0.90, cx - R * 0.30, cy + R * 0.98);
      g.bezierCurveTo(cx - R * 0.50, cy + R * 1.16, cx - R * 0.80, cy + R * 1.08, cx - R * 0.56, cy + R * 0.94);
      g.bezierCurveTo(cx - R * 0.96, cy + R * 0.82, cx - R, cy + R * 0.56, cx - R, cy);
    }
    g.closePath();
  }


  function whiteEyes(g, cx, ey, R, sep, w, h, by, flick) {
    for (const s of [-1, 1]) {
      const dx = cx + s * sep;
      const topY = by - h;
      const ptX = dx + s * flick;            // 上端（外側へ跳ねる）
      g.beginPath();
      g.moveTo(dx - s * w * 0.45, by - h * 0.04);                          // 内側の底
      g.bezierCurveTo(dx - s * w * 0.15, by + h * 0.14,                    // 底をまわって
                      dx + s * w * 0.85, by + h * 0.06,
                      dx + s * w * 1.02, by - h * 0.30);                   // 外側のふくらみ
      g.bezierCurveTo(dx + s * w * 1.04, topY + h * 0.34,                  // 外側を上へ
                      dx + s * (w * 0.46 + flick), topY - h * 0.02,
                      ptX, topY);                                          // 先端へ
      g.bezierCurveTo(dx - s * w * 0.16, topY + h * 0.16,                  // 内側を下る
                      dx - s * w * 0.58, by - h * 0.52,
                      dx - s * w * 0.45, by - h * 0.04);
      g.closePath();
      g.fillStyle = '#fff';
      g.fill();
      g.lineWidth = R * 0.045;
      g.strokeStyle = 'rgba(20,40,60,0.22)';
      g.stroke();

      // 黒目（瞳）— 白目の下のほう・やや内寄りに置く
      const pr = w * 0.46;                       // 瞳の半径
      const px = dx + s * w * 0.04;              // ほんの少し内側
      const py = by - h * 0.30;                  // 下寄り
      g.beginPath();
      g.ellipse(px, py, pr, pr * 1.12, 0, 0, Math.PI * 2);
      g.fillStyle = '#241c28';
      g.fill();
      // キャッチライト（白い反射）
      g.beginPath();
      g.arc(px - s * pr * 0.34, py - pr * 0.42, pr * 0.34, 0, Math.PI * 2);
      g.fillStyle = 'rgba(255,255,255,0.95)';
      g.fill();
    }
  }


  function drawFaceKind(g, kind, cx, cy, R, colorIdx) {
    const ey = cy - R * 0.04;
    const dark = darken(COLORS[colorIdx], 0.55);
    g.lineCap = 'round';
    g.lineJoin = 'round';

    if (kind === 'classic') {
      // 緑・青: 大きく背の高い炎型の白目（先端が外へ跳ねる）
      whiteEyes(g, cx, ey, R, R * 0.44, R * 0.40, R * 0.96, cy + R * 0.42, R * 0.20);
      return;
    }

    if (kind === 'happy') {
      // 黄: 丸めで少し低い白目（かわいい印象）
      whiteEyes(g, cx, ey, R, R * 0.40, R * 0.40, R * 0.74, cy + R * 0.30, R * 0.06);
      return;
    }

    if (kind === 'angry') {
      // 赤: 白目＋黒目のちゃんとした目に、つり上がった眉で「怒り」を表現
      const off = R * 0.46;
      const eyc = ey + R * 0.12;
      for (const s of [-1, 1]) {
        const ex = cx + s * off;
        // 白目（縦長のたまご型）
        g.beginPath();
        g.ellipse(ex, eyc, R * 0.30, R * 0.40, 0, 0, Math.PI * 2);
        g.fillStyle = '#fff';
        g.fill();
        g.lineWidth = R * 0.045;
        g.strokeStyle = 'rgba(20,40,60,0.22)';
        g.stroke();
        // 黒目（内寄り・下寄りで にらむ感じ）
        const px = ex - s * R * 0.05, py = eyc + R * 0.08;
        g.beginPath();
        g.ellipse(px, py, R * 0.16, R * 0.19, 0, 0, Math.PI * 2);
        g.fillStyle = '#241c28';
        g.fill();
        g.beginPath();
        g.arc(px - s * R * 0.06, py - R * 0.08, R * 0.06, 0, Math.PI * 2);
        g.fillStyle = 'rgba(255,255,255,0.95)';
        g.fill();
        // つり上がった眉（怒り）
        g.beginPath();
        g.moveTo(ex - s * R * 0.30, eyc - R * 0.36);
        g.lineTo(ex + s * R * 0.30, eyc - R * 0.62);
        g.lineWidth = R * 0.16;
        g.strokeStyle = dark;
        g.lineCap = 'round';
        g.stroke();
      }
      return;
    }

    if (kind === 'sleepy') {
      // 紫: 眠そうな半目（重く垂れたまぶた＋下からのぞく目）
      const off = R * 0.42;
      for (const s of [-1, 1]) {
        const ex = cx + s * off;
        const eyc = ey + R * 0.18;
        // 白目
        g.beginPath();
        g.ellipse(ex, eyc, R * 0.34, R * 0.32, 0, 0, Math.PI * 2);
        g.fillStyle = '#fff';
        g.fill();
        // 黒目（下寄り）
        g.beginPath();
        g.arc(ex, eyc + R * 0.10, R * 0.16, 0, Math.PI * 2);
        g.fillStyle = dark;
        g.fill();
        g.beginPath();
        g.arc(ex - R * 0.05, eyc + R * 0.03, R * 0.05, 0, Math.PI * 2);
        g.fillStyle = 'rgba(255,255,255,0.92)';
        g.fill();
        // 重いまぶた（外側が下がる＝眠そう）。目の上2/3を覆う
        const innerX = ex - s * R * 0.42, outerX = ex + s * R * 0.42;
        const innerY = eyc - R * 0.06, outerY = eyc + R * 0.13;
        g.beginPath();
        g.moveTo(innerX, innerY);
        g.bezierCurveTo(innerX, eyc - R * 0.42, outerX, eyc - R * 0.42, outerX, outerY);
        g.quadraticCurveTo(ex, eyc + R * 0.02, innerX, innerY);
        g.closePath();
        g.fillStyle = darken(COLORS[colorIdx], 0.32);
        g.fill();
      }
      return;
    }
  }


  function drawPuyoChar(g, x, y, colorIdx, mergeUp) {
    const cx = x + CELL / 2;
    const cy = y + CELL * 0.50;
    const R = CELL * 0.40;
    // 上に同色がつながっている時はツノを引っ込めて丸くなる(連結が途切れて見えないように)
    let type = SHAPE[colorIdx];
    if (mergeUp && type === 'horns') type = 'blob';

    // 本体（放射グラデで球のツヤ）＋落ち影
    g.save();
    g.shadowColor = 'rgba(0,0,0,0.28)';
    g.shadowBlur = CELL * 0.13;
    g.shadowOffsetY = CELL * 0.07;
    bodyPath(g, type, cx, cy, R);
    // 光源を左上に置いた放射グラデ：中心が明るく、外周ほど濃くして球の丸みを強調
    const grad = g.createRadialGradient(cx - R * 0.40, cy - R * 0.54, R * 0.06, cx - R * 0.04, cy + R * 0.18, R * 1.42);
    grad.addColorStop(0,    lighten(COLORS[colorIdx], 0.72));
    grad.addColorStop(0.30, lighten(COLORS[colorIdx], 0.18));
    grad.addColorStop(0.62, COLORS[colorIdx]);
    grad.addColorStop(0.86, darken(EDGE[colorIdx], 0.04));
    grad.addColorStop(1,    darken(EDGE[colorIdx], 0.22));
    g.fillStyle = grad;
    g.fill();
    g.restore();

    // ハイライト類（本体内にクリップ）
    g.save();
    bodyPath(g, type, cx, cy, R);
    g.clip();

    // 内側のリム影（外周をぐるりと暗くして“球”の立体感を出す）
    const rim = g.createRadialGradient(cx, cy + R * 0.06, R * 0.62, cx, cy + R * 0.06, R * 1.12);
    rim.addColorStop(0, 'rgba(0,0,0,0)');
    rim.addColorStop(0.78, 'rgba(0,0,0,0)');
    rim.addColorStop(1, 'rgba(0,0,0,0.30)');
    g.fillStyle = rim;
    g.fillRect(cx - R * 1.6, cy - R * 1.6, R * 3.2, R * 3.2);

    // 下からの照り返し（色味のサブサーフェス光）でぷるんと感
    g.beginPath();
    g.ellipse(cx, cy + R * 0.66, R * 0.70, R * 0.40, 0, 0, Math.PI * 2);
    const sss = g.createRadialGradient(cx, cy + R * 0.66, R * 0.04, cx, cy + R * 0.66, R * 0.72);
    sss.addColorStop(0, _rgba(lighten(COLORS[colorIdx], 0.55), 0.55));
    sss.addColorStop(1, _rgba(lighten(COLORS[colorIdx], 0.55), 0));
    g.fillStyle = sss;
    g.fill();

    // 大きな上のツヤ（やわらかいグロス帯）
    g.beginPath();
    g.ellipse(cx - R * 0.28, cy - R * 0.50, R * 0.56, R * 0.40, -0.5, 0, Math.PI * 2);
    const gloss = g.createRadialGradient(cx - R * 0.34, cy - R * 0.58, R * 0.04, cx - R * 0.28, cy - R * 0.50, R * 0.58);
    gloss.addColorStop(0, 'rgba(255,255,255,0.85)');
    gloss.addColorStop(1, 'rgba(255,255,255,0)');
    g.fillStyle = gloss;
    g.fill();

    // 鋭いスペキュラの点（つやの芯）
    g.beginPath();
    g.ellipse(cx - R * 0.44, cy - R * 0.62, R * 0.17, R * 0.12, -0.4, 0, Math.PI * 2);
    g.fillStyle = 'rgba(255,255,255,0.98)';
    g.fill();
    // 小さな2つ目のキラリ
    g.beginPath();
    g.ellipse(cx - R * 0.12, cy - R * 0.40, R * 0.07, R * 0.05, -0.4, 0, Math.PI * 2);
    g.fillStyle = 'rgba(255,255,255,0.85)';
    g.fill();

    g.restore();

    // 輪郭
    bodyPath(g, type, cx, cy, R);
    g.lineWidth = CELL * 0.03;
    g.strokeStyle = darken(EDGE[colorIdx], 0.12);
    g.stroke();

    // 顔
    drawFaceKind(g, FACE_KIND[colorIdx], cx, cy, R, colorIdx);
  }

  // おじゃまぷよ(灰色・困り顔)
  function drawOjama(g, x, y) {
    const cx = x + CELL / 2, cy = y + CELL * 0.5, R = CELL * 0.4;
    g.save();
    g.shadowColor = 'rgba(0,0,0,0.28)'; g.shadowBlur = CELL * 0.12; g.shadowOffsetY = CELL * 0.06;
    bodyPath(g, 'blob', cx, cy, R);
    const grad = g.createRadialGradient(cx - R * 0.4, cy - R * 0.5, R * 0.06, cx, cy + R * 0.18, R * 1.4);
    grad.addColorStop(0, '#eef1f7'); grad.addColorStop(0.5, '#c4cbdb'); grad.addColorStop(1, '#8b93a8');
    g.fillStyle = grad; g.fill();
    g.restore();
    bodyPath(g, 'blob', cx, cy, R);
    g.lineWidth = CELL * 0.03; g.strokeStyle = '#6b7286'; g.stroke();
    // 困り顔(への字＋点目)
    g.fillStyle = '#3a3f4d';
    for (const s of [-1, 1]) { g.beginPath(); g.arc(cx + s * R * 0.34, cy - R * 0.06, R * 0.12, 0, Math.PI * 2); g.fill(); }
    g.beginPath(); g.lineWidth = R * 0.12; g.strokeStyle = '#3a3f4d'; g.lineCap = 'round';
    g.moveTo(cx - R * 0.26, cy + R * 0.5); g.quadraticCurveTo(cx, cy + R * 0.3, cx + R * 0.26, cy + R * 0.5); g.stroke();
  }
  // 通常ぷよ or おじゃまを描く
  function drawPuyo(g, x, y, colorIdx, mergeUp) {
    if (colorIdx === OJAMA) { drawOjama(g, x, y); return; }
    drawPuyoChar(g, x, y, colorIdx, mergeUp);
  }


  function roundRectPath(g, x, y, w, h, r) {
    r = Math.min(r, w / 2, h / 2);
    g.beginPath();
    g.moveTo(x + r, y);
    g.arcTo(x + w, y, x + w, y + h, r);
    g.arcTo(x + w, y + h, x, y + h, r);
    g.arcTo(x, y + h, x, y, r);
    g.arcTo(x, y, x + w, y, r);
    g.closePath();
  }


  function bodyGrad(g, col, top, bottom) {
    const grad = g.createLinearGradient(0, top, 0, bottom);
    grad.addColorStop(0, lighten(COLORS[col], 0.34));
    grad.addColorStop(0.5, COLORS[col]);
    grad.addColorStop(1, EDGE[col]);
    return grad;
  }

  // 同色連結のつなぎ目(おじゃまはつながない)
  function drawConnectors(g, colorAt) {
    for (let r = 0; r < TOTAL; r++) {
      for (let c = 0; c < COLS; c++) {
        const col = colorAt(r, c);
        if (col === null || col === undefined || col === OJAMA) continue;
        if (c + 1 < COLS && colorAt(r, c + 1) === col) {
          const cx = (c + 1) * CELL, cy = (r + 0.5) * CELL, w = CELL * 0.92, h = CELL * 0.66;
          g.fillStyle = bodyGrad(g, col, cy - h / 2, cy + h / 2);
          roundRectPath(g, cx - w / 2, cy - h / 2, w, h, CELL * 0.2); g.fill();
        }
        if (r + 1 < TOTAL && colorAt(r + 1, c) === col) {
          const cx = (c + 0.5) * CELL, cy = (r + 1) * CELL, w = CELL * 0.66, h = CELL * 0.92;
          g.fillStyle = bodyGrad(g, col, cy - h / 2, cy + h / 2);
          roundRectPath(g, cx - w / 2, cy - h / 2, w, h, CELL * 0.2); g.fill();
        }
      }
    }
  }

  // ===== フィールド(盤面1つ分) =====
  function createField(canvasEl, opts) {
    const canvas = canvasEl;
    const ctx = canvas.getContext('2d');
    const useVoice = !!opts.useVoice;
    let colorCount = opts.colorCount || 4;
    let dropInterval = opts.dropInterval || 560;
    // 状態
    let board, piece, nextQueue, score, maxChain, gameOver;
    let dropTimer = 0, softDrop = false, paused = false;
    let phase = 'play';
    let clearingList = [], clearTimer = 0, resolveChain = 0, particles = [];
    let clearDur, chainPopup = null, chainVoice = null;
    let shockwaves = [], shakeT = 0, shakeMag = 0, flash = null, chargeX = 0, chargeY = 0, chargeHue = '#fff';
    let zenkeshiPending = false, zenkeshiFx = null, gameoverFx = null;
    let fallingList = [], fallingTargets = null, fallTimer = 0, fallNext = null;
    let wobbleSet = new Set(), wobbleTimer = 0;
    let pendingGarbage = 0, garbageCarry = 0, sendAccum = 0;
    // 定数
    const CLEAR_DURATION = 480, CHAIN_POPUP_DUR = 1100, CHAIN_VOICE_DUR = 1300;
    const FALL_TAME = 110, FALL_G = 0.0042, WOBBLE_DUR = 420;
    const ZENKESHI_BONUS = 2100, ZENKESHI_FX_DUR = 1800, SOFT_INTERVAL = 45;
    clearDur = CLEAR_DURATION;

    function randColor() { return Math.floor(Math.random() * colorCount); }
    function showScore() { if (opts.onScore) opts.onScore(score); }
    function showChain(v) { if (opts.onChain) opts.onChain(v); }
    function updateHUD(chain) { showScore(); showChain(chain); }
    function spell(chain) {
      const idx = Math.min(chain - 1, CHAIN_SPELLS.length - 1);
      chainVoice = { text: CHAIN_SPELLS[idx].show, t: 0 };
      if (useVoice) playSpell(idx, chain);
    }
    function dangerLevel() {
      let minRow = TOTAL;
      for (let c = 0; c < COLS; c++) for (let r = 0; r < TOTAL; r++) { if (board[r][c] !== null) { if (r < minRow) minRow = r; break; } }
      const safeRow = HIDDEN + 6, dangerRow = HIDDEN;
      return Math.max(0, Math.min(1, (safeRow - minRow) / (safeRow - dangerRow)));
    }



  function newPiece() {
    // 2手先まで見えるよう、ネクストを2組分キューで持つ
    if (!nextQueue) nextQueue = [[randColor(), randColor()], [randColor(), randColor()]];
    const colors = nextQueue.shift();
    nextQueue.push([randColor(), randColor()]);
    return { row: 1, col: 2, rot: 0, axis: colors[0], child: colors[1] };
  }



  function childCell(p, rot = p.rot, row = p.row, col = p.col) {
    return { r: row + DR[rot], c: col + DC[rot] };
  }



  function cellFree(r, c) {
    if (c < 0 || c >= COLS || r >= TOTAL) return false;
    if (r < 0) return true; // 上方向のはみ出しは許容(出現直後)
    return board[r][c] === null;
  }



  function valid(p, rot = p.rot, row = p.row, col = p.col) {
    if (!cellFree(row, col)) return false;
    const ch = childCell(p, rot, row, col);
    return cellFree(ch.r, ch.c);
  }


  function move(dir) {
    if (gameOver || paused || !piece) return;
    if (valid(piece, piece.rot, piece.row, piece.col + dir)) {
      piece.col += dir;
      sMove();
    }
  }



  function rotate(dir) { // dir: +1=右回転, -1=左回転
    if (gameOver || paused || !piece) return;
    const newRot = (piece.rot + (dir > 0 ? 1 : 3)) % 4;
    // 壁蹴り候補: そのまま→左→右→上→下
    const kicks = [[0, 0], [0, -1], [0, 1], [-1, 0], [1, 0]];
    for (const [dr, dc] of kicks) {
      if (valid(piece, newRot, piece.row + dr, piece.col + dc)) {
        piece.rot = newRot;
        piece.row += dr;
        piece.col += dc;
        sRotate();
        return;
      }
    }
  }



  function stepDown() {
    if (valid(piece, piece.rot, piece.row + 1, piece.col)) {
      piece.row += 1;
      return true;
    }
    return false;
  }



  function lockPiece() {
    const ch = childCell(piece);
    const lockedKeys = [];
    if (piece.row >= 0 && piece.row < TOTAL) lockedKeys.push(piece.row * COLS + piece.col);
    if (ch.r >= 0 && ch.r < TOTAL) lockedKeys.push(ch.r * COLS + ch.c);
    // 盤面に収まるぶんを固定(上にはみ出した分は捨てる)。
    // ここではゲームオーバーにせず、まず連鎖を完全に解決する。
    placeCell(piece.row, piece.col, piece.axis);
    placeCell(ch.r, ch.c, piece.child);
    piece = null;
    sLand();
    beginResolve(lockedKeys);   // 連鎖がすべて解決してから次のぷよを出す
  }



  function placeCell(r, c, color) {
    // 盤外(上にはみ出したセルなど)は無視。ゲームオーバー判定は出現時のみ行う。
    if (r < 0 || r >= TOTAL || c < 0 || c >= COLS) return;
    board[r][c] = color;
  }


  function applyGravity() {
    for (let c = 0; c < COLS; c++) {
      let write = TOTAL - 1;
      for (let r = TOTAL - 1; r >= 0; r--) {
        if (board[r][c] !== null) {
          const v = board[r][c];
          board[r][c] = null;
          board[write][c] = v;
          write--;
        }
      }
    }
  }


  function computeFalls() {
    const falls = [];
    for (let c = 0; c < COLS; c++) {
      let write = TOTAL - 1;
      for (let r = TOTAL - 1; r >= 0; r--) {
        if (board[r][c] !== null) {
          if (write !== r) {
            falls.push({ color: board[r][c], col: c, fromRow: r, toRow: write });
          }
          write--;
        }
      }
    }
    return falls;
  }


  function beginFall(next, restCells) {
    const falls = computeFalls();
    if (falls.length === 0) {
      if (restCells && restCells.length) startWobble(restCells);
      next();
      return;
    }
    applyGravity();                 // 盤面は最終形に確定
    fallingList = falls;
    fallingTargets = new Set();
    for (const f of falls) fallingTargets.add(f.toRow * COLS + f.col);
    fallTimer = 0;
    fallNext = next;
    phase = 'fall';                 // ← この間は落下アニメ(入力停止)
  }


  function updateFall(dt) {
    fallTimer += dt;
    const t = Math.max(0, fallTimer - FALL_TAME);   // 「ため」のあとに落下開始
    const dist = 0.5 * FALL_G * t * t;              // 落下した行数
    let done = true;
    for (const f of fallingList) {
      const span = f.toRow - f.fromRow;
      f.cur = Math.min(f.toRow, f.fromRow + dist);
      if (dist < span) done = false;
    }
    if (done) {
      const landed = [...fallingTargets];
      fallingList = [];
      fallingTargets = null;
      startWobble(landed);          // 着地でぷるんと揺れる
      sDrop();
      const cb = fallNext; fallNext = null;
      phase = 'clear-pending';      // 一時的: 次処理へ
      if (cb) cb();
    }
  }


  function beginResolve(restKeys) {
    resolveChain = 0;
    beginFall(() => nextClearStep(), restKeys);   // まず重力で落とす(ためて落ちる演出)
  }


  function emitPop(r, c, colorIdx, chain) {
    chain = chain || 1;
    const boost = 1 + Math.min(chain, 8) * 0.14;     // 連鎖が大きいほど勢いを増す
    const cx = c * CELL + CELL / 2, cy = r * CELL + CELL / 2;
    const n = 12 + Math.min(chain, 8) * 3;           // 連鎖が大きいほど粒も多く
    for (let i = 0; i < n; i++) {
      const a = (Math.PI * 2 * i / n) + Math.random() * 0.5;
      const sp = (1.8 + Math.random() * 3.6) * boost;
      const star = Math.random() < 0.45;       // 一部はキラキラ星
      particles.push({
        x: cx, y: cy,
        vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp - 1.5,
        life: 1,
        decay: 0.03 + Math.random() * 0.03,
        size: (star ? 3 : 2) + Math.random() * 3,
        color: Math.random() < 0.5 ? '#fff' : COLORS[colorIdx],
        star,
        spin: Math.random() * Math.PI,
        vspin: (Math.random() - 0.5) * 0.4,
      });
    }
  }



  function updateParticles(dt) {
    const f = dt / 16;
    for (const p of particles) {
      p.x += p.vx * f;
      p.y += p.vy * f;
      p.vy += 0.2 * f;     // 重力
      p.vx *= Math.pow(0.96, f);  // 空気抵抗でふわっと
      p.spin += (p.vspin || 0) * f;
      p.life -= (p.decay || 0.05) * f;
    }
    particles = particles.filter((p) => p.life > 0);
  }




  function drawParticles(g) {
    for (const p of particles) {
      g.save();
      g.globalAlpha = Math.max(0, p.life);
      g.globalCompositeOperation = 'lighter';   // 光って見える
      g.shadowColor = p.color;
      g.shadowBlur = 8;
      g.fillStyle = p.color;
      if (p.star) {
        drawStar(g, p.x, p.y, p.size * 1.7, p.size * 0.72, 4, p.spin);
      } else {
        g.beginPath();
        g.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        g.fill();
      }
      g.restore();
    }
  }


  function updateShockwaves(dt) {
    for (const s of shockwaves) s.t += dt;
    shockwaves = shockwaves.filter((s) => s.t < (s.delay || 0) + s.dur);
  }



  function drawShockwaves(g) {
    for (const s of shockwaves) {
      const te = s.t - (s.delay || 0);             // 時間差ぶんを引く
      if (te < 0) continue;                        // まだ発生前
      const p = te / s.dur;                        // 0..1
      const rad = s.max * (0.18 + 0.82 * (1 - Math.pow(1 - p, 2)));
      g.save();
      g.globalCompositeOperation = 'lighter';
      g.shadowColor = s.hue;
      g.shadowBlur = CELL * 0.4 * (1 - p);
      // 外側のリング(太め)
      g.globalAlpha = (1 - p) * 0.7;
      g.lineWidth = Math.max(1, CELL * 0.26 * (1 - p));
      g.strokeStyle = s.hue;
      g.beginPath();
      g.arc(s.x, s.y, rad, 0, Math.PI * 2);
      g.stroke();
      // 内側のやわらかい光
      g.shadowBlur = 0;
      g.globalAlpha = (1 - p) * 0.18;
      g.beginPath();
      g.arc(s.x, s.y, rad * 0.7, 0, Math.PI * 2);
      g.fillStyle = s.hue;
      g.fill();
      g.restore();
    }
  }



  function startWobble(keys) {
    wobbleSet = new Set(keys);
    wobbleTimer = 0;
  }


  function wobbleScale(r, c) {
    if (!wobbleSet.has(r * COLS + c)) return null;
    const p = wobbleTimer / WOBBLE_DUR;
    if (p >= 1) return null;
    const env = Math.pow(1 - p, 1.7);                       // 減衰
    const a = 0.24 * env * Math.cos(p * Math.PI * 2 * 2.2); // 数回バウンド
    return { sx: 1 + a * 0.6, sy: 1 - a };                  // 体積保存ぎみに横伸び縦縮み
  }


  function withWobble(g, r, c, fn) {
    const w = wobbleScale(r, c);
    if (!w) { fn(); return; }
    const cx = c * CELL + CELL / 2, by = r * CELL + CELL;
    g.save();
    g.translate(cx, by);
    g.scale(w.sx, w.sy);
    g.translate(-cx, -by);
    fn();
    g.restore();
  }


  function updateGameoverFx(dt) {
    if (!gameoverFx) return;
    gameoverFx.t += dt;
    const f = dt / 16;
    let allGone = true;
    for (const p of gameoverFx.puyos) {
      if (gameoverFx.t < p.delay) { allGone = false; continue; }  // まだ崩れ始めてない
      p.vy += 0.64 * f;            // 重力
      p.cy += p.vy * f;
      p.cx += p.vx * f;
      p.rot += p.vrot * f;
      if (p.cy < TOTAL * CELL + CELL * 1.6) allGone = false;       // まだ画面内
    }
    if (allGone && !gameoverFx.shown) {
      gameoverFx.shown = true;
      finishGameOver();
    }
  }


  function drawGameoverFx(g) {
    if (!gameoverFx) return;
    for (const p of gameoverFx.puyos) {
      g.save();
      g.translate(p.cx, p.cy);
      g.rotate(p.rot);
      drawPuyo(g, -CELL / 2, -CELL * 0.5, p.color, false);
      g.restore();
    }
  }



  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    // 画面シェイク(連鎖の迫力)。盤面全体を小刻みに揺らす
    if (shakeT > 0) {
      const env = Math.min(1, shakeT / 160);          // 減衰
      const m = shakeMag * env;
      ctx.translate((Math.random() * 2 - 1) * m, (Math.random() * 2 - 1) * m);
    }
    // 盤面は上のHIDDEN行を画面外に隠す(見える12行ぶんだけ表示)
    ctx.translate(0, -HIDDEN * CELL);
    // グリッド線(見える領域: 盤面行 HIDDEN〜TOTAL)
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.lineWidth = 1;
    for (let c = 1; c < COLS; c++) {
      ctx.beginPath(); ctx.moveTo(c * CELL, HIDDEN * CELL); ctx.lineTo(c * CELL, TOTAL * CELL); ctx.stroke();
    }
    for (let r = HIDDEN + 1; r < TOTAL; r++) {
      ctx.beginPath(); ctx.moveTo(0, r * CELL); ctx.lineTo(COLS * CELL, r * CELL); ctx.stroke();
    }
    // ポップ(縮小)中の消去セルは色付き body を隠し、白いポップだけ見せる
    const popping = phase === 'clear' && clearTimer >= clearDur - 130;
    const popSet = new Set();
    if (popping) for (const { r, c } of clearingList) popSet.add(r * COLS + c);
    // 落下中は着地予定セルを盤面から隠し、落下ぷよを別途描く
    const falling = phase === 'fall' && fallingTargets;
    const hidden = (r, c) =>
      (popping && popSet.has(r * COLS + c)) ||
      (falling && fallingTargets.has(r * COLS + c));

    // 操作中ぷよを盤面に重ねた「色マップ」。これで同色判定して連結を描く
    const overlayCells = {};
    if (phase === 'play' && piece) {
      if (piece.row >= 0) overlayCells[piece.row * COLS + piece.col] = piece.axis;
      const chc = childCell(piece);
      if (chc.r >= 0) overlayCells[chc.r * COLS + chc.c] = piece.child;
    }
    const colorAt = (r, c) => {
      if (r < 0 || r >= TOTAL || c < 0 || c >= COLS) return null;
      const k = r * COLS + c;
      if (k in overlayCells) return overlayCells[k];
      if (hidden(r, c)) return null;
      return board[r][c];
    };
    // 同色の連結部分を先に塗る(スプライトの下地になる)
    drawConnectors(ctx, colorAt);

    // 固定ぷよ: 3Dモデル画像で描画(着地の揺れを反映)
    for (let r = 0; r < TOTAL; r++) {
      for (let c = 0; c < COLS; c++) {
        const col = board[r][c];
        if (col === null || hidden(r, c)) continue;
        withWobble(ctx, r, c, () => drawPuyo(ctx, c * CELL, r * CELL, col, colorAt(r - 1, c) === col));
      }
    }
    // ゲームオーバー: 崩れ落ちる破片(盤面はすでに空)
    drawGameoverFx(ctx);
    // 消去演出: 対象ぷよを白く点滅 → 終盤はポップ(縮小)
    if (phase === 'clear') {
      const t = clearTimer;
      const popStart = clearDur - 130;
      // 溜め演出: 中心に光が集まり、終盤ほど強く速く脈動する
      if (t < popStart) {
        const cp = Math.min(1, t / popStart);                 // 0..1 充電進捗
        const pulse = 0.5 + 0.5 * Math.sin(t / (60 - cp * 38)); // 終盤ほど速い鼓動
        // 中心の集光グロー(だんだん大きく明るく)
        const R = CELL * (1.2 + 3.4 * cp);
        const grd = ctx.createRadialGradient(chargeX, chargeY, 0, chargeX, chargeY, R);
        grd.addColorStop(0, chargeHue);
        grd.addColorStop(1, _rgba(chargeHue, 0));
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ctx.globalAlpha = (0.10 + 0.5 * cp) * (0.55 + 0.45 * pulse);
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.arc(chargeX, chargeY, R, 0, Math.PI * 2);
        ctx.fill();
        // 収束リング(外から中心へ縮んで「溜め」を見せる)
        ctx.globalAlpha = 0.4 * cp;
        ctx.lineWidth = CELL * 0.14;
        ctx.strokeStyle = chargeHue;
        ctx.shadowColor = chargeHue;
        ctx.shadowBlur = CELL * 0.5;
        const cr = CELL * (5.0 * (1 - cp) + 0.6);
        ctx.beginPath();
        ctx.arc(chargeX, chargeY, cr, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }
      for (const { r, c } of clearingList) {
        const x = c * CELL, y = r * CELL;
        if (t < popStart) {
          // 点滅(白くフラッシュ)。終盤ほど点滅を速く
          const speed = t > popStart - 160 ? 45 : 80;
          if (Math.floor(t / speed) % 2 === 1) {
            ctx.save();
            ctx.globalAlpha = 0.55;
            ctx.globalCompositeOperation = 'lighter';
            ctx.beginPath();
            ctx.arc(x + CELL / 2, y + CELL / 2, CELL * 0.46, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
            ctx.restore();
          }
        } else {
          // ポップ: 白い円が縮みながら消える
          const p = (t - popStart) / 130; // 0..1
          ctx.save();
          ctx.globalAlpha = 1 - p;
          ctx.beginPath();
          ctx.arc(x + CELL / 2, y + CELL / 2, Math.max(0, CELL * 0.44 * (1 - p)), 0, Math.PI * 2);
          ctx.fillStyle = '#fff';
          ctx.fill();
          ctx.restore();
        }
      }
    }

    // 落下(重力)アニメ中のぷよ: 補間位置に独立して描く
    if (falling) {
      for (const f of fallingList) {
        const yr = (f.cur === undefined ? f.fromRow : f.cur);
        drawPuyo(ctx, f.col * CELL, yr * CELL, f.color);
      }
    }

    // 操作中のぷよ(落下中は独立して表示)
    if (piece) {
      if (piece.row >= 0) {
        drawPuyo(ctx, piece.col * CELL, piece.row * CELL, piece.axis,
                 colorAt(piece.row - 1, piece.col) === piece.axis);
      }
      const ch = childCell(piece);
      if (ch.r >= 0) {
        drawPuyo(ctx, ch.c * CELL, ch.r * CELL, piece.child,
                 colorAt(ch.r - 1, ch.c) === piece.child);
      }
    }

    // 衝撃波リング(連鎖の爆発感)
    drawShockwaves(ctx);

    // パーティクル(消える瞬間のキラッと弾ける演出)
    drawParticles(ctx);

    // 連鎖カウント演出
    drawChainPopup(ctx);

    // 連鎖ボイス(本家風のセリフ・カットイン)
    drawChainVoice(ctx);

    ctx.restore();   // シェイク用 translate を解除

    // 全消しバナー(画面座標で中央に表示)
    drawZenkeshi(ctx);

    // 画面フラッシュ(シェイクの影響を受けず全面を覆う)
    if (flash) {
      const fp = flash.t / flash.dur;
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.globalAlpha = flash.alpha * (1 - fp);
      ctx.fillStyle = flash.hue;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.restore();
    }
  }


  function drawChainPopup(g) {
    if (!chainPopup) return;
    const p = chainPopup.t / CHAIN_POPUP_DUR;       // 0..1
    // 出だしは弾むように拡大、終盤で上に浮きながらフェード
    const pop = p < 0.25
      ? 1.25 * (1 - Math.pow(1 - p / 0.25, 3))      // ぴょこっと拡大(オーバーシュート気味)
      : 1.25 - 0.08 * Math.sin((p - 0.25) / 0.75 * Math.PI);
    const rise = p < 0.25 ? 0 : -(p - 0.25) / 0.75 * (CELL * 0.9);
    const alpha = p < 0.7 ? 1 : Math.max(0, 1 - (p - 0.7) / 0.3);
    const x = Math.max(CELL * 0.9, Math.min(canvas.width - CELL * 0.9, chainPopup.x));
    const y = chainPopup.y + rise;
    const col = CHAIN_HUES[Math.min(chainPopup.n - 2, CHAIN_HUES.length - 1)];
    const big = 1 + Math.min(chainPopup.n - 2, 8) * 0.07;   // 連鎖が大きいほど文字も大きく

    g.save();
    g.globalAlpha = alpha;
    g.translate(x, y);
    g.scale(pop * big, pop * big);
    g.shadowColor = col;          // 光るふちどり
    g.shadowBlur = 14;
    g.textAlign = 'center';
    g.textBaseline = 'middle';
    g.font = 'bold 30px "Hiragino Maru Gothic ProN", "Yu Gothic", system-ui, sans-serif';
    // 数字を大きく、「連鎖」を小さく
    const num = String(chainPopup.n);
    g.font = 'bold 38px "Hiragino Maru Gothic ProN", "Yu Gothic", system-ui, sans-serif';
    const numW = g.measureText(num).width;
    g.font = 'bold 20px "Hiragino Maru Gothic ProN", "Yu Gothic", system-ui, sans-serif';
    const tailW = g.measureText('連鎖').width;
    const total = numW + 4 + tailW;
    const startX = -total / 2;

    // 影
    g.lineJoin = 'round';
    // 数字
    g.font = 'bold 38px "Hiragino Maru Gothic ProN", "Yu Gothic", system-ui, sans-serif';
    g.lineWidth = 6; g.strokeStyle = 'rgba(0,0,0,0.55)';
    g.fillStyle = col;
    g.textAlign = 'left';
    g.strokeText(num, startX, 0);
    g.fillText(num, startX, 0);
    // 「連鎖」
    g.font = 'bold 20px "Hiragino Maru Gothic ProN", "Yu Gothic", system-ui, sans-serif';
    g.lineWidth = 5;
    g.fillStyle = '#fff';
    g.strokeText('連鎖', startX + numW + 4, 3);
    g.fillText('連鎖', startX + numW + 4, 3);
    g.restore();
  }


  function drawChainVoice(g) {
    if (!chainVoice) return;
    const p = chainVoice.t / CHAIN_VOICE_DUR;          // 0..1
    // 横からシュッと滑り込み→中央で弾み→最後にフェード
    const slide = p < 0.18 ? (1 - p / 0.18) * canvas.width * 0.6 : 0;
    const pop = p < 0.18
      ? 1
      : p < 0.32 ? 1 + 0.12 * Math.sin((p - 0.18) / 0.14 * Math.PI) : 1;
    const alpha = p < 0.78 ? 1 : Math.max(0, 1 - (p - 0.78) / 0.22);
    const tilt = -0.06;                                 // ちょい斜めで勢いを出す
    const cx = canvas.width / 2 + slide;
    // 盤面は HIDDEN 行ぶん上にずれた座標系で描かれるため、隠れ行を足して
    // 見える盤面の上部に収める(これを忘れると画面外に飛び出して隠れる)
    const cy = (HIDDEN + 1.5) * CELL;
    const txt = chainVoice.text;

    g.save();
    g.globalAlpha = alpha;
    g.translate(cx, cy);
    g.rotate(tilt);
    g.scale(pop, pop);
    g.textAlign = 'center';
    g.textBaseline = 'middle';
    g.font = '900 34px "Hiragino Maru Gothic ProN", "Yu Gothic", system-ui, sans-serif';
    const w = g.measureText(txt).width;
    // 背景の帯(虹色グラデで本家っぽく)
    const grad = g.createLinearGradient(-w / 2, 0, w / 2, 0);
    grad.addColorStop(0, '#ff4a8c');
    grad.addColorStop(0.5, '#ffd24a');
    grad.addColorStop(1, '#5a9bff');
    g.fillStyle = grad;
    g.globalAlpha = alpha * 0.9;
    const padX = 18, padY = 10, bw = w + padX * 2, bh = 34 + padY * 2;
    if (g.roundRect) { g.beginPath(); g.roundRect(-bw / 2, -bh / 2, bw, bh, 12); g.fill(); }
    else g.fillRect(-bw / 2, -bh / 2, bw, bh);
    g.globalAlpha = alpha;
    // 文字(白抜き＋濃いふちどり＋発光)
    g.lineJoin = 'round';
    g.shadowColor = 'rgba(255,255,255,0.9)';
    g.shadowBlur = 12;
    g.lineWidth = 7; g.strokeStyle = 'rgba(40,20,60,0.85)';
    g.strokeText(txt, 0, 1);
    g.shadowBlur = 0;
    g.fillStyle = '#fff';
    g.fillText(txt, 0, 1);
    g.restore();
  }


  function drawZenkeshi(g) {
    if (!zenkeshiFx) return;
    const t = zenkeshiFx.t;
    const p = t / ZENKESHI_FX_DUR;
    const alpha = p < 0.78 ? 1 : Math.max(0, 1 - (p - 0.78) / 0.22);
    const chars = 'ぜんけし';
    const size = 46;
    const spacing = size * 1.06;
    const cx = canvas.width / 2;
    const cy = canvas.height / 2 - CELL * 0.6;
    const startX = cx - spacing * (chars.length - 1) / 2;
    g.save();
    g.globalAlpha = alpha;
    g.textAlign = 'center';
    g.textBaseline = 'middle';
    g.lineJoin = 'round';
    g.font = `bold ${size}px "Hiragino Maru Gothic ProN", "Yu Gothic", system-ui, sans-serif`;
    for (let i = 0; i < chars.length; i++) {
      const ct = t - i * 95;             // 1文字ずつ順に登場
      if (ct < 0) continue;
      const ap = Math.min(1, ct / 240);
      const s = 1.7 - 0.7 * (1 - Math.pow(1 - ap, 3));   // 大きく出てキュッと収まる
      const bob = Math.sin(ct / 280 + i * 0.9) * 4;       // ぷかぷか上下
      const col = CHAIN_HUES[i % CHAIN_HUES.length];
      g.save();
      g.globalAlpha = alpha * ap;
      g.translate(startX + spacing * i, cy + bob);
      g.scale(s, s);
      g.shadowColor = col;
      g.shadowBlur = 16;
      g.lineWidth = 7;
      g.strokeStyle = 'rgba(0,0,0,0.6)';
      g.strokeText(chars[i], 0, 0);
      g.fillStyle = col;
      g.fillText(chars[i], 0, 0);
      g.restore();
    }
    g.restore();
  }


    // 消去対象(同色4つ以上)。おじゃまは種にしない・たどらない
    function findClearCells() {
      const seen = Array.from({ length: TOTAL }, () => Array(COLS).fill(false));
      const result = [];
      for (let r = 0; r < TOTAL; r++) {
        for (let c = 0; c < COLS; c++) {
          if (board[r][c] === null || board[r][c] === OJAMA || seen[r][c]) continue;
          const color = board[r][c];
          const stack = [[r, c]], group = []; seen[r][c] = true;
          while (stack.length) {
            const [cr, cc] = stack.pop(); group.push([cr, cc]);
            for (let d = 0; d < 4; d++) {
              const nr = cr + DR[d], nc = cc + DC[d];
              if (nr < 0 || nr >= TOTAL || nc < 0 || nc >= COLS) continue;
              if (seen[nr][nc] || board[nr][nc] !== color) continue;
              seen[nr][nc] = true; stack.push([nr, nc]);
            }
          }
          if (group.length >= 4) for (const [gr, gc] of group) result.push({ r: gr, c: gc });
        }
      }
      return result;
    }

    // 連鎖の次ステップ。消えるものが無ければ連鎖終了→おじゃま送受→次ぷよ
    function nextClearStep() {
      const cells = findClearCells();
      if (cells.length === 0) {
        maxChain = Math.max(maxChain, resolveChain);
        updateHUD(resolveChain);
        if (resolveChain >= 1 && board.every((row) => row.every((v) => v === null))) {
          zenkeshiPending = true; zenkeshiFx = { t: 0 }; sZenkeshi(); sendAccum += ZENKESHI_BONUS;
        }
        const total = sendAccum + garbageCarry;
        const send = Math.floor(total / TARGET);
        garbageCarry = total - send * TARGET; sendAccum = 0;
        if (send > 0 && opts.onSend) opts.onSend(send);   // 相殺＋相手へ(同期)
        phase = 'play';
        if (pendingGarbage > 0) dropPendingGarbage();
        else spawnNext();
        return;
      }
      resolveChain++; showChain(resolveChain); clearingList = cells; clearTimer = 0;
      let sx = 0, sy = 0; for (const { r, c } of cells) { sx += c; sy += r; }
      chargeX = (sx / cells.length + 0.5) * CELL; chargeY = (sy / cells.length + 0.5) * CELL;
      chargeHue = CHAIN_HUES[Math.min(Math.max(resolveChain - 1, 0), CHAIN_HUES.length - 1)];
      clearDur = CLEAR_DURATION + Math.min(resolveChain - 1, 8) * 105;
      phase = 'clear';
    }

    // 消去演出が終わったら実際に消す→スコア→おじゃま消し→重力
    function finishClearStep() {
      const n = clearingList.length;
      const chainBonus = resolveChain === 1 ? 1 : (1 << (resolveChain - 1));
      const gained = n * 10 * chainBonus;
      score += gained; sendAccum += gained;
      if (zenkeshiPending) { score += ZENKESHI_BONUS; zenkeshiPending = false; }
      showScore();
      sPop(resolveChain);
      spell(resolveChain);
      let sx = 0, sy = 0; for (const { r, c } of clearingList) { sx += c; sy += r; }
      const cx = (sx / clearingList.length + 0.5) * CELL;
      const cy = (sy / clearingList.length + 0.5) * CELL;
      const hue = CHAIN_HUES[Math.min(Math.max(resolveChain - 1, 0), CHAIN_HUES.length - 1)];
      if (resolveChain >= 2) chainPopup = { n: resolveChain, t: 0, x: cx, y: cy };
      const rings = Math.min(2 + Math.floor(resolveChain / 2), 5);
      for (let i = 0; i < rings; i++) shockwaves.push({ x: cx, y: cy, t: 0, delay: i * 75, dur: 480 + resolveChain * 55, hue: CHAIN_HUES[Math.min(resolveChain - 1 + i, CHAIN_HUES.length - 1)], max: CELL * (2.4 + resolveChain * 0.7) * (1 + i * 0.2) });
      flash = { t: 0, dur: 300, alpha: Math.min(0.16 + resolveChain * 0.07, 0.55), hue };
      shakeMag = Math.min(3 + (resolveChain - 1) * 2.8 + n * 0.25, 18); shakeT = 240 + resolveChain * 30;
      // 消えるぷよに隣接するおじゃまも消す
      const ojama = [];
      for (const { r, c } of clearingList) for (let d = 0; d < 4; d++) {
        const nr = r + DR[d], nc = c + DC[d];
        if (nr < 0 || nr >= TOTAL || nc < 0 || nc >= COLS) continue;
        if (board[nr][nc] === OJAMA) ojama.push({ r: nr, c: nc });
      }
      for (const { r, c } of clearingList) { emitPop(r, c, board[r][c], resolveChain); board[r][c] = null; }
      for (const { r, c } of ojama) board[r][c] = null;
      clearingList = []; beginFall(() => nextClearStep());
    }

    // おじゃまを盤面に降らせる(最大30個・6列に均等配分)
    function dropPendingGarbage() {
      let k = Math.min(30, pendingGarbage); pendingGarbage -= k;
      const per = Math.floor(k / COLS); let rem = k - per * COLS;
      const order = [2, 3, 1, 4, 0, 5];
      const cnt = new Array(COLS).fill(per);
      for (const c of order) { if (rem <= 0) break; cnt[c]++; rem--; }
      for (let c = 0; c < COLS; c++) { let need = cnt[c]; for (let r = 0; r < TOTAL && need > 0; r++) { if (board[r][c] === null) { board[r][c] = OJAMA; need--; } } }
      sDrop();
      if (opts.onGarbageChange) opts.onGarbageChange();
      beginFall(() => spawnNext());
    }

    function spawnNext() {
      piece = newPiece();
      if (!valid(piece)) { gameOver = true; endGame(); if (opts.onDead) opts.onDead(); return; }
      phase = 'play';   // おじゃま降下(fall)後など、操作フェーズに確実に戻す
    }

    function endGame() {
      piece = null;
      if (useVoice) stopVoice();
      const puyos = [];
      for (let r = 0; r < TOTAL; r++) for (let c = 0; c < COLS; c++) {
        const col = board[r][c]; if (col === null) continue;
        puyos.push({ cx: c * CELL + CELL / 2, cy: r * CELL + CELL / 2, vx: (Math.random() * 2 - 1) * 1.5, vy: Math.random() * 0.5, rot: 0, vrot: (Math.random() * 2 - 1) * 0.2, color: col, delay: (TOTAL - r) * 14 + Math.random() * 90 });
        board[r][c] = null;
      }
      gameoverFx = { puyos, t: 0, shown: false };
      sGameOver(); shakeMag = 11; shakeT = 380;
      if (puyos.length === 0) finishGameOver();
    }
    function finishGameOver() { if (opts.onCollapseDone) opts.onCollapseDone(); }

    function reset() {
      board = Array.from({ length: TOTAL }, () => Array(COLS).fill(null));
      nextQueue = null; piece = newPiece();
      score = 0; maxChain = 0; gameOver = false;
      dropTimer = 0; phase = 'play';
      clearingList = []; clearTimer = 0; resolveChain = 0; particles = [];
      clearDur = CLEAR_DURATION; chainPopup = null; chainVoice = null;
      if (useVoice) stopVoice();
      shockwaves = []; shakeT = 0; shakeMag = 0; flash = null;
      zenkeshiPending = false; zenkeshiFx = null; gameoverFx = null;
      fallingList = []; fallingTargets = null; fallTimer = 0; fallNext = null;
      wobbleSet = new Set(); wobbleTimer = 0;
      softDrop = false; pendingGarbage = 0; garbageCarry = 0; sendAccum = 0;
      showScore(); showChain(0);
    }

    function update(dt) {
      if (!gameOver) {
        if (phase === 'play' && piece) {
          dropTimer += dt;
          const interval = softDrop ? SOFT_INTERVAL : dropInterval;
          if (dropTimer >= interval) { dropTimer = 0; if (!stepDown()) lockPiece(); }
        } else if (phase === 'fall') { updateFall(dt); }
        else if (phase === 'clear') { clearTimer += dt; if (clearTimer >= clearDur) finishClearStep(); }
      }
      updateParticles(dt); updateShockwaves(dt); updateGameoverFx(dt);
      if (shakeT > 0) shakeT -= dt;
      if (flash) { flash.t += dt; if (flash.t >= flash.dur) flash = null; }
      if (wobbleSet.size) { wobbleTimer += dt; if (wobbleTimer >= WOBBLE_DUR) wobbleSet = new Set(); }
      if (chainPopup) { chainPopup.t += dt; if (chainPopup.t >= CHAIN_POPUP_DUR) chainPopup = null; }
      if (chainVoice) { chainVoice.t += dt; if (chainVoice.t >= CHAIN_VOICE_DUR) chainVoice = null; }
      if (zenkeshiFx) { zenkeshiFx.t += dt; if (zenkeshiFx.t >= ZENKESHI_FX_DUR) zenkeshiFx = null; }
    }

    return {
      update, draw, reset,
      moveL: () => move(-1), moveR: () => move(1),
      rotateL: () => rotate(-1), rotateR: () => rotate(1),
      setSoft: (v) => { softDrop = v; if (!v) dropTimer = 0; },
      setPaused: (p) => { paused = p; },
      setColorCount: (n) => { colorCount = n; },
      setDropInterval: (ms) => { dropInterval = ms; },
      dangerLevel,
      get score() { return score; },
      get maxChain() { return maxChain; },
      get phase() { return phase; },
      get alive() { return !gameOver; },
      get piece() { return piece; },
      get nextQueue() { return nextQueue; },
      get board() { return board; },
      get pendingGarbage() { return pendingGarbage; },
      setPending: (n) => { pendingGarbage = Math.max(0, n); },
      addGarbage: (n) => { pendingGarbage += n; },
      get collapseDone() { return gameoverFx ? gameoverFx.shown : false; },
    };
  }

  // ===== コントローラ(2フィールド・CPU・試合進行) =====
  const $ = (id) => document.getElementById(id);
  const playerField = createField($('bd-p'), {
    useVoice: true, colorCount: 4,
    onScore: (s) => { $('sc-p').textContent = pad8(s); },
    onSend: (n) => routeGarbage(playerField, cpuField, n),
    onDead: () => onFieldDead('p'),
    onCollapseDone: () => onCollapseDone('p'),
    onGarbageChange: updateOjama,
  });
  const cpuField = createField($('bd-c'), {
    useVoice: false, colorCount: 4,
    onScore: (s) => { $('sc-c').textContent = pad8(s); },
    onSend: (n) => routeGarbage(cpuField, playerField, n),
    onDead: () => onFieldDead('c'),
    onCollapseDone: () => onCollapseDone('c'),
    onGarbageChange: updateOjama,
  });

  function pad8(n) { return String(n).padStart(8, '0'); }

  let matchPhase = 'ready';   // ready | playing | collapsing | over
  let wins = { p: 0, c: 0 };
  let loserSide = null;
  let difficulty = 1;         // 0弱 1中 2強
  let colorCount = 4;
  let mode = 'vs';            // 'vs'=CPU対戦 / 'solo'=一人で練習

  // おじゃまの送り: 自分の予告を相殺→余りを相手へ
  function routeGarbage(from, to, n) {
    if (mode !== 'vs') return;   // 一人練習はおじゃま無し
    const leftover = n - from.pendingGarbage;
    if (leftover >= 0) { from.setPending(0); to.addGarbage(leftover); }
    else { from.setPending(from.pendingGarbage - n); }
    updateOjama();
  }

  // 本家風のおじゃま予告アイコン(個数の段階で 小ぷよ→大ぷよ→岩→星→月→王冠)
  const FORECAST = [[720, 'crown'], [360, 'moon'], [180, 'star'], [30, 'rock'], [6, 'big'], [1, 'small']];
  function forecastIcons(n) {
    const out = []; let rem = n;
    for (const [v, t] of FORECAST) { while (rem >= v && out.length < 6) { out.push(t); rem -= v; } }
    return out;
  }
  const ojCtxP = $('oj-p').getContext('2d');
  const ojCtxC = $('oj-c').getContext('2d');
  function updateOjama() {
    renderForecast(ojCtxP, $('oj-p'), playerField.pendingGarbage);
    renderForecast(ojCtxC, $('oj-c'), cpuField.pendingGarbage);
  }
  function renderForecast(g, cv, n) {
    g.clearRect(0, 0, cv.width, cv.height);
    if (n <= 0) return;
    const icons = forecastIcons(n);
    const r = 13, gap = 30, cy = cv.height / 2;
    icons.forEach((t, i) => drawForecastIcon(g, t, 8 + r + i * gap, cy, r));
  }
  function drawForecastIcon(g, type, cx, cy, r) {
    g.save();
    g.lineJoin = 'round';
    if (type === 'small' || type === 'big') {
      const rr = type === 'big' ? r : r * 0.66;
      const grad = g.createRadialGradient(cx - rr * 0.4, cy - rr * 0.45, rr * 0.1, cx, cy + rr * 0.1, rr * 1.25);
      grad.addColorStop(0, '#eef1f7'); grad.addColorStop(0.5, '#c4cbdb'); grad.addColorStop(1, '#8b93a8');
      g.fillStyle = grad; g.beginPath(); g.arc(cx, cy, rr, 0, Math.PI * 2); g.fill();
      g.strokeStyle = '#6b7286'; g.lineWidth = 1.4; g.stroke();
      g.fillStyle = '#3a3f4d';
      for (const s of [-1, 1]) { g.beginPath(); g.arc(cx + s * rr * 0.42, cy - rr * 0.05, rr * 0.16, 0, Math.PI * 2); g.fill(); }
    } else if (type === 'rock') {
      g.fillStyle = '#9aa1b2'; g.strokeStyle = '#5f6678'; g.lineWidth = 1.5;
      g.beginPath();
      for (let i = 0; i < 6; i++) { const a = -Math.PI / 2 + i * Math.PI / 3; const px = cx + Math.cos(a) * r, py = cy + Math.sin(a) * r * 0.92; i ? g.lineTo(px, py) : g.moveTo(px, py); }
      g.closePath(); g.fill(); g.stroke();
      g.strokeStyle = 'rgba(40,45,60,0.5)'; g.lineWidth = 1; g.beginPath(); g.moveTo(cx - r * 0.3, cy - r * 0.3); g.lineTo(cx, cy + r * 0.1); g.lineTo(cx + r * 0.35, cy - r * 0.15); g.stroke();
    } else if (type === 'star') {
      g.shadowColor = '#ffd24a'; g.shadowBlur = 6;
      g.fillStyle = '#b9851f'; drawStar(g, cx, cy, r * 1.12, r * 0.52, 5, -Math.PI / 2);
      g.shadowBlur = 0;
      g.fillStyle = '#ffe14a'; drawStar(g, cx, cy, r, r * 0.45, 5, -Math.PI / 2);
      g.fillStyle = 'rgba(255,255,255,0.85)'; g.beginPath(); g.arc(cx - r * 0.2, cy - r * 0.25, r * 0.14, 0, Math.PI * 2); g.fill();
    } else if (type === 'moon') {
      g.fillStyle = '#ffe27a'; g.strokeStyle = '#b9851f'; g.lineWidth = 1.2;
      g.beginPath();
      g.arc(cx, cy, r, Math.PI * 0.32, Math.PI * 1.68, false);
      g.arc(cx + r * 0.55, cy, r * 0.95, Math.PI * 1.5, Math.PI * 0.5, true);
      g.closePath(); g.fill(); g.stroke();
    } else if (type === 'crown') {
      const w = r * 1.8, h = r * 1.5, bx = cx - w / 2, rx = cx + w / 2, by = cy + h * 0.42, ty = cy - h * 0.55;
      g.fillStyle = '#ffd84a'; g.strokeStyle = '#b9851f'; g.lineWidth = 1.4;
      g.beginPath();
      g.moveTo(bx, by);
      g.lineTo(bx, cy + h * 0.02);
      g.lineTo(cx - w * 0.30, ty + h * 0.22);   // 左の山
      g.lineTo(cx - w * 0.12, cy + h * 0.14);   // 谷
      g.lineTo(cx, ty);                          // 中央の山(最高)
      g.lineTo(cx + w * 0.12, cy + h * 0.14);   // 谷
      g.lineTo(cx + w * 0.30, ty + h * 0.22);   // 右の山
      g.lineTo(rx, cy + h * 0.02);
      g.lineTo(rx, by);
      g.closePath(); g.fill(); g.stroke();
      g.fillStyle = '#fff3b0';
      for (const p of [[cx - w * 0.30, ty + h * 0.22], [cx, ty], [cx + w * 0.30, ty + h * 0.22]]) { g.beginPath(); g.arc(p[0], p[1], r * 0.16, 0, Math.PI * 2); g.fill(); }
    }
    g.restore();
  }

  function onFieldDead(side) {
    if (matchPhase !== 'playing') return;
    matchPhase = 'collapsing';
    loserSide = side;
    $(side === 'p' ? 'ko-p' : 'ko-c').classList.add('show');
  }
  function onCollapseDone(side) {
    if (matchPhase !== 'collapsing' || side !== loserSide) return;
    if (mode === 'solo') { matchPhase = 'between'; setTimeout(showResult, 600); return; }
    const winner = loserSide === 'p' ? 'c' : 'p';
    wins[winner]++;
    updateStars();
    matchPhase = 'between';
    if (wins[winner] >= 2) { setTimeout(showResult, 700); }
    else { setTimeout(startRound, 1100); }
  }

  function updateStars() {
    $('st-p1').classList.toggle('on', wins.p >= 1);
    $('st-p2').classList.toggle('on', wins.p >= 2);
    $('st-c1').classList.toggle('on', wins.c >= 1);
    $('st-c2').classList.toggle('on', wins.c >= 2);
  }

  function showResult() {
    matchPhase = 'over'; gGameOver = true; stopBGM();
    if (mode === 'solo') {
      $('result-title').textContent = 'GAME OVER';
      $('result-sub').textContent = 'スコア ' + playerField.score + ' ／ 最大 ' + playerField.maxChain + ' 連鎖';
    } else {
      const win = wins.p > wins.c;
      $('result-title').textContent = win ? 'YOU WIN!' : 'YOU LOSE...';
      $('result-sub').textContent = 'あなた ' + wins.p + ' - ' + wins.c + ' CPU';
    }
    $('resultov').classList.add('show');
  }

  // 難易度ごとの設定
  const DIFF = [
    { drop: 720, ai: 380, plan: 'random' },  // 弱
    { drop: 600, ai: 210, plan: 'greedy' },  // 中
    { drop: 520, ai: 120, plan: 'chain' },   // 強
  ];

  function startMatch() {
    wins = { p: 0, c: 0 }; updateStars();
    gGameOver = false;
    startRound();
  }
  function startRound() {
    document.body.classList.toggle('mode-solo', mode === 'solo');
    $('ko-p').classList.remove('show'); $('ko-c').classList.remove('show');
    const d = DIFF[difficulty];
    playerField.setColorCount(colorCount); cpuField.setColorCount(colorCount);
    playerField.setDropInterval(560); cpuField.setDropInterval(d.drop);
    playerField.reset(); cpuField.reset();
    playerField.setPaused(false); cpuField.setPaused(false);
    aiReset();
    updateOjama();
    matchPhase = 'playing';
    gGameOver = false;
    startBGM();
  }

  // ===== CPU AI =====
  let aiPiece = null, aiTarget = null, aiTimer = 0;
  function aiReset() { aiPiece = null; aiTarget = null; aiTimer = 0; cpuField.setSoft(false); }
  function aiTick(dt) {
    if (cpuField.phase !== 'play') { aiPiece = null; return; }
    const pc = cpuField.piece; if (!pc) return;
    if (pc !== aiPiece) { aiPiece = pc; aiTarget = planPlacement(cpuField.board, pc, difficulty); aiTimer = 0; cpuField.setSoft(false); }
    if (!aiTarget) return;
    aiTimer += dt;
    const iv = DIFF[difficulty].ai;
    if (aiTimer < iv) return;
    aiTimer = 0;
    if (pc.rot !== aiTarget.rot) { cpuField.rotateR(); return; }
    if (pc.col < aiTarget.col) { cpuField.moveR(); return; }
    if (pc.col > aiTarget.col) { cpuField.moveL(); return; }
    cpuField.setSoft(true);   // 位置が合ったら一気に落とす
  }

  // 着手評価
  function colHeight(b, c) { for (let r = 0; r < TOTAL; r++) if (b[r][c] !== null) return TOTAL - r; return 0; }
  function dropInto(b, c, color) { for (let r = TOTAL - 1; r >= 0; r--) if (b[r][c] === null) { b[r][c] = color; return r; } return -1; }
  function cloneBoard(b) { return b.map((row) => row.slice()); }
  function simulatePlace(b, col, rot, axis, child) {
    const nb = cloneBoard(b);
    if (rot === 0) { if (dropInto(nb, col, axis) < 0) return null; if (dropInto(nb, col, child) < 0) return null; }
    else if (rot === 2) { if (dropInto(nb, col, child) < 0) return null; if (dropInto(nb, col, axis) < 0) return null; }
    else if (rot === 1) { if (col + 1 >= COLS) return null; if (dropInto(nb, col, axis) < 0) return null; if (dropInto(nb, col + 1, child) < 0) return null; }
    else { if (col - 1 < 0) return null; if (dropInto(nb, col, axis) < 0) return null; if (dropInto(nb, col - 1, child) < 0) return null; }
    return nb;
  }
  function simulateChains(b) {
    let chains = 0;
    for (;;) {
      const seen = Array.from({ length: TOTAL }, () => Array(COLS).fill(false));
      const groups = [];
      for (let r = 0; r < TOTAL; r++) for (let c = 0; c < COLS; c++) {
        if (b[r][c] === null || b[r][c] === OJAMA || seen[r][c]) continue;
        const color = b[r][c], st = [[r, c]], grp = []; seen[r][c] = true;
        while (st.length) { const [cr, cc] = st.pop(); grp.push([cr, cc]); for (let d = 0; d < 4; d++) { const nr = cr + DR[d], nc = cc + DC[d]; if (nr < 0 || nr >= TOTAL || nc < 0 || nc >= COLS) continue; if (seen[nr][nc] || b[nr][nc] !== color) continue; seen[nr][nc] = true; st.push([nr, nc]); } }
        if (grp.length >= 4) groups.push(grp);
      }
      if (!groups.length) break;
      chains++;
      for (const grp of groups) for (const [r, c] of grp) {
        b[r][c] = null;
        for (let d = 0; d < 4; d++) { const nr = r + DR[d], nc = c + DC[d]; if (nr >= 0 && nr < TOTAL && nc >= 0 && nc < COLS && b[nr][nc] === OJAMA) b[nr][nc] = null; }
      }
      // 重力
      for (let c = 0; c < COLS; c++) { let w = TOTAL - 1; for (let r = TOTAL - 1; r >= 0; r--) if (b[r][c] !== null) { const v = b[r][c]; b[r][c] = null; b[w][c] = v; w--; } }
    }
    return chains;
  }
  function evalBoard(b, diff) {
    const heights = []; for (let c = 0; c < COLS; c++) heights[c] = colHeight(b, c);
    const maxH = Math.max.apply(null, heights);
    let bump = 0; for (let c = 0; c < COLS - 1; c++) bump += Math.abs(heights[c] - heights[c + 1]);
    let adj = 0;
    for (let r = 0; r < TOTAL; r++) for (let c = 0; c < COLS; c++) {
      const v = b[r][c]; if (v === null || v === OJAMA) continue;
      if (c + 1 < COLS && b[r][c + 1] === v) adj++;
      if (r + 1 < TOTAL && b[r + 1][c] === v) adj++;
    }
    let s = adj * 4 - maxH * 6 - bump * 2;
    if (maxH >= TOTAL - 1) s -= 500;
    if (diff >= 2) { const chains = simulateChains(cloneBoard(b)); s += chains * chains * 140; }
    return s;
  }
  function planPlacement(board, pc, diff) {
    const cands = [];
    for (let rot = 0; rot < 4; rot++) for (let col = 0; col < COLS; col++) {
      const nb = simulatePlace(board, col, rot, pc.axis, pc.child);
      if (!nb) continue;
      cands.push({ col, rot, nb });
    }
    if (!cands.length) return { col: 2, rot: 0 };
    if (diff === 0) {
      // 弱: ほぼランダム(極端に高い列は避ける)
      const ok = cands.filter((c) => colHeight(board, c.col) < TOTAL - 2);
      const pool = ok.length ? ok : cands;
      const pick = pool[Math.floor(Math.random() * pool.length)];
      return { col: pick.col, rot: pick.rot };
    }
    let best = null, bestS = -Infinity;
    for (const c of cands) {
      const s = evalBoard(c.nb, diff) + Math.random() * (diff === 1 ? 6 : 2);
      if (s > bestS) { bestS = s; best = c; }
    }
    return { col: best.col, rot: best.rot };
  }

  // ===== 次ぷよプレビュー描画 =====
  const nxp = $('nx-p').getContext('2d');
  const nxc = $('nx-c').getContext('2d');
  // 縦ぷよ1組を中心x・上端yに、指定倍率で描く
  function drawPairAt(g, pair, cx, topY, scale) {
    if (!pair) return;
    g.save();
    g.translate(cx, topY);
    g.scale(scale, scale);
    if (pair[0] === pair[1]) {
      const ccy = CELL, w = CELL * 0.66, h = CELL * 0.92;
      g.fillStyle = bodyGrad(g, pair[0], ccy - h / 2, ccy + h / 2);
      roundRectPath(g, -w / 2, ccy - h / 2, w, h, CELL * 0.2); g.fill();
    }
    drawPuyo(g, -CELL / 2, 0, pair[0]);
    drawPuyo(g, -CELL / 2, CELL, pair[1], pair[0] === pair[1]);
    g.restore();
  }
  // 本家風の階段配置: NEXT(大)を左下、NEXT2(小)を右上にずらして表示
  function drawNextPreview(g, cv, queue) {
    g.clearRect(0, 0, cv.width, cv.height);
    if (!queue || !queue.length) return;
    drawPairAt(g, queue[0], CELL * 0.62, cv.height - CELL * 2 - 6, 1.0);   // NEXT(左下)
    drawPairAt(g, queue[1], cv.width - CELL * 0.62, 6, 1.0);               // NEXT2(右上・同じ大きさ)
  }

  // ===== メインループ =====
  let last = performance.now();
  function loop(now) {
    const dt = Math.min(now - last, 50); last = now;
    if (matchPhase === 'playing' && !gPaused) {
      playerField.update(dt);
      if (mode === 'vs') { cpuField.update(dt); aiTick(dt); }
    } else if (matchPhase === 'collapsing') {
      (loserSide === 'p' ? playerField : cpuField).update(dt);
    }
    playerField.draw(); cpuField.draw();
    drawNextPreview(nxp, $('nx-p'), playerField.nextQueue);
    drawNextPreview(nxc, $('nx-c'), cpuField.nextQueue);
    updateBGMTempo(matchPhase === 'playing' ? playerField.dangerLevel() : 0);
    requestAnimationFrame(loop);
  }

  // ===== 入力(プレイヤー) =====
  function canInput() { return matchPhase === 'playing' && !gPaused; }
  document.addEventListener('keydown', (e) => {
    ensureAudio(); startBGM();
    if (!canInput()) return;
    switch (e.key) {
      case 'a': case 'A': playerField.moveL(); e.preventDefault(); break;
      case 'd': case 'D': playerField.moveR(); e.preventDefault(); break;
      case 's': case 'S': playerField.setSoft(true); e.preventDefault(); break;
      case 'ArrowLeft': playerField.rotateL(); e.preventDefault(); break;
      case 'ArrowRight': playerField.rotateR(); e.preventDefault(); break;
    }
  });
  document.addEventListener('keyup', (e) => { if (e.key === 's' || e.key === 'S') playerField.setSoft(false); });

  function bindPress(id, onDown, onUp, repeat) {
    const el = $(id); if (!el) return; let timer = null;
    const stop = () => { if (timer) { clearInterval(timer); timer = null; } if (onUp) onUp(); };
    el.addEventListener('pointerdown', (e) => { e.preventDefault(); ensureAudio(); startBGM(); if (!canInput()) return; onDown(); if (repeat) timer = setInterval(onDown, 110); });
    el.addEventListener('pointerup', stop); el.addEventListener('pointerleave', stop); el.addEventListener('pointercancel', stop);
    el.addEventListener('contextmenu', (e) => e.preventDefault());
  }
  bindPress('btn-left', () => playerField.moveL(), null, true);
  bindPress('btn-right', () => playerField.moveR(), null, true);
  bindPress('btn-down', () => playerField.setSoft(true), () => playerField.setSoft(false), false);
  bindPress('btn-rotL', () => playerField.rotateL(), null, false);
  bindPress('btn-rotR', () => playerField.rotateR(), null, false);

  // ===== UI(難易度・開始・結果・設定) =====
  function bindDiffSeg(segId) {
    const seg = $(segId); if (!seg) return;
    seg.addEventListener('click', (e) => {
      const b = e.target.closest('.seg-btn'); if (!b) return;
      difficulty = parseInt(b.dataset.d, 10);
      for (const sid of ['diff-seg', 'diff-seg2']) { const s = $(sid); if (!s) continue; for (const x of s.querySelectorAll('.seg-btn')) x.classList.toggle('is-on', parseInt(x.dataset.d, 10) === difficulty); }
    });
  }
  bindDiffSeg('diff-seg'); bindDiffSeg('diff-seg2');

  // モード選択(CPU対戦 / 一人で練習)
  $('mode-seg').addEventListener('click', (e) => {
    const b = e.target.closest('.seg-btn'); if (!b) return;
    mode = b.dataset.m;
    for (const x of $('mode-seg').querySelectorAll('.seg-btn')) x.classList.toggle('is-on', x.dataset.m === mode);
    $('diff-wrap').style.display = mode === 'solo' ? 'none' : '';
    document.body.classList.toggle('mode-solo', mode === 'solo');
  });

  $('start-btn').addEventListener('click', () => { ensureAudio(); $('startov').classList.remove('show'); startMatch(); });
  $('again-btn').addEventListener('click', () => { $('resultov').classList.remove('show'); gGameOver = false; startMatch(); });

  // 設定ドロワー
  $('gear').addEventListener('click', () => { $('drawer').classList.add('show'); $('drawer-backdrop').classList.add('show'); gPaused = true; stopBGM(); });
  function closeDrawer() { $('drawer').classList.remove('show'); $('drawer-backdrop').classList.remove('show'); gPaused = false; startBGM(); }
  $('drawer-close').addEventListener('click', () => { closeDrawer(); if (matchPhase !== 'ready') startMatch(); });
  $('drawer-backdrop').addEventListener('click', closeDrawer);
  $('color-seg').addEventListener('click', (e) => {
    const b = e.target.closest('.seg-btn'); if (!b) return;
    colorCount = parseInt(b.dataset.n, 10);
    for (const x of $('color-seg').querySelectorAll('.seg-btn')) x.classList.toggle('is-on', parseInt(x.dataset.n, 10) === colorCount);
  });
  $('sound').addEventListener('change', (e) => { soundOn = e.target.checked; if (soundOn) { ensureAudio(); startBGM(); } else { stopBGM(); stopVoice(); } });

  document.addEventListener('touchmove', (e) => { if (!e.target.closest('.drawer')) e.preventDefault(); }, { passive: false });

  // 初期描画
  playerField.reset(); cpuField.reset(); updateStars(); updateOjama();
  requestAnimationFrame(loop);
})();

</script>
</body>
