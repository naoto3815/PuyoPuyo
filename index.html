<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ぷよぷよ CPU対戦</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { height: 100%; }
  body {
    margin: 0; color: #fff;
    font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    min-height: 100vh; overflow-x: hidden;
    -webkit-user-select: none; user-select: none; touch-action: manipulation;
    overscroll-behavior: none;
    /* お祭り・ステージ風のカラフル背景(オリジナル) */
    background:
      radial-gradient(circle at 12% 18%, rgba(255,120,200,0.30), transparent 40%),
      radial-gradient(circle at 88% 16%, rgba(120,200,255,0.30), transparent 40%),
      radial-gradient(circle at 50% 0%,  rgba(255,235,140,0.25), transparent 45%),
      radial-gradient(circle at 20% 88%, rgba(140,255,190,0.22), transparent 45%),
      radial-gradient(circle at 80% 86%, rgba(190,140,255,0.24), transparent 45%),
      linear-gradient(180deg, #3a2370 0%, #5a2e86 38%, #7d3f8f 60%, #46306e 100%);
  }
  /* 床の市松(ステージ感) */
  #stage { position: relative; min-height: 100vh; min-height: var(--app-height, 100vh);
    display: flex; flex-direction: column; align-items: center; padding: 14px 10px; }
  #stage::before {
    content: ""; position: fixed; left: 0; right: 0; bottom: 0; height: 42%;
    background:
      repeating-linear-gradient(90deg, rgba(255,255,255,0.05) 0 40px, rgba(0,0,0,0.05) 40px 80px),
      linear-gradient(180deg, transparent, rgba(0,0,0,0.28));
    transform: perspective(420px) rotateX(46deg); transform-origin: bottom; pointer-events: none; z-index: 0;
  }
  /* 上部の電飾ライン */
  #stage::after {
    content: ""; position: fixed; top: 0; left: 0; right: 0; height: 10px; z-index: 0; pointer-events: none;
    background: repeating-linear-gradient(90deg,#ff5d8f 0 14px,#ffd24a 14px 28px,#5ad1ff 28px 42px,#9b7bff 42px 56px);
    opacity: .8;
  }
  #arena {
    position: relative; z-index: 1;
    display: flex; gap: 12px; align-items: flex-start; justify-content: center; width: 100%; max-width: 760px;
  }
  .side { display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1 1 0; min-width: 0; }
  .bwrap { position: relative; width: 100%; max-width: 264px; }
  canvas.board {
    width: 100%; height: auto; display: block; background: #0d0a1f;
    border: 3px solid rgba(255,255,255,0.55); border-radius: 8px;
    box-shadow: 0 6px 22px rgba(0,0,0,0.45);
  }
  .side.p canvas.board { border-color: #ff7db0; }
  .side.c canvas.board { border-color: #6fb8ff; }
  /* 盤上の✕(やられマーク) */
  .ko { position: absolute; top: 6px; left: 50%; transform: translateX(-50%);
    color: #ff4a4a; font-size: 30px; font-weight: 900; display: none; text-shadow: 0 2px 6px rgba(0,0,0,.6); }
  .ko.show { display: block; }
  /* おじゃま予告 */
  .ojama-row { width: 100%; max-width: 264px; height: 30px; display: block; }
  /* スコア・名前バー */
  .scorebar {
    width: 100%; max-width: 264px; text-align: center; font-weight: 800; font-size: 22px;
    letter-spacing: 2px; color: #fff; font-variant-numeric: tabular-nums;
    background: linear-gradient(180deg, rgba(0,0,0,0.35), rgba(0,0,0,0.15));
    border-radius: 6px; padding: 2px 0;
  }
  .namebar {
    width: 100%; max-width: 264px; text-align: center; font-weight: 800; font-size: 16px;
    border-radius: 999px; padding: 5px 0; box-shadow: 0 3px 0 rgba(0,0,0,0.25);
  }
  .namebar.p { background: linear-gradient(180deg,#ff5d8f,#d6356f); }
  .namebar.c { background: linear-gradient(180deg,#4aa3ff,#2f6fd0); }
  /* 中央列 */
  #center { display: flex; flex-direction: column; align-items: center; gap: 10px;
    flex: 0 0 120px; padding-top: 6px; }
  #stars { display: flex; gap: 4px; align-items: center; font-size: 20px; }
  .star { color: #4a3f6a; transition: color .2s; }
  .star.p.on { color: #ff6ea2; text-shadow: 0 0 8px #ff6ea2; }
  .star.c.on { color: #6fb8ff; text-shadow: 0 0 8px #6fb8ff; }
  #stars .win { font-size: 13px; font-weight: 800; color: #ffe14a; }
  .vs { font-size: 22px; font-weight: 900; color: #ffe14a; text-shadow: 0 2px 0 #b06a00; letter-spacing: 1px; }
  .nextpair { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .nx { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  /* 一人で練習モード: 相手側・対戦表示を隠す */
  body.mode-solo .side.c { display: none; }
  body.mode-solo #stars, body.mode-solo .vs { visibility: hidden; }
  body.mode-solo .nextpair .nx:last-child { display: none; }
  .nx span { font-size: 10px; color: #d8cffa; letter-spacing: 1px; }
  .nx canvas { background: #0d0a1f; border: 2px solid rgba(255,255,255,0.35); border-radius: 6px;
    width: 68px; height: auto; }
  .gear {
    width: 38px; height: 38px; border-radius: 10px; border: 2px solid rgba(255,255,255,0.4);
    background: rgba(20,12,40,0.6); color: #fff; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  /* 操作パッド */
  .pad {
    position: relative; z-index: 1;
    display: flex; justify-content: center; gap: 28px; align-items: flex-end;
    margin-top: 12px; width: 100%; max-width: 520px;
  }
  .pad-group { display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .pad-label { font-size: 11px; color: #e7dffd; letter-spacing: 2px; }
  .pad-row { display: flex; gap: 9px; }
  .btn {
    width: 54px; height: 54px; border-radius: 50%; border: none; color: #fff; font-size: 21px; line-height: 1;
    cursor: pointer; user-select: none; touch-action: manipulation;
    background: #4a3f7a; box-shadow: 0 4px 0 #2c2550; transition: transform .05s, box-shadow .05s;
  }
  .btn:active { transform: translateY(4px); box-shadow: 0 0 0 #2c2550; }
  .btn.rot { background: #ff5d8f; box-shadow: 0 4px 0 #b83564; }
  .btn.rot:active { box-shadow: 0 0 0 #b83564; }
  /* オーバーレイ(開始・結果) */
  .overlay {
    position: fixed; inset: 0; z-index: 60; display: none;
    flex-direction: column; justify-content: center; align-items: center;
    background: rgba(8,5,20,0.82); text-align: center; padding: 20px;
  }
  .overlay.show { display: flex; }
  .overlay h2 { font-size: 30px; margin: 0 0 6px; }
  .overlay p { color: #d8cffa; margin: 4px 0 16px; }
  .seg { display: flex; gap: 10px; margin: 8px 0 18px; }
  .seg-btn {
    padding: 10px 18px; border-radius: 10px; cursor: pointer; font-size: 15px; font-weight: 800;
    border: 2px solid #6a5aa0; background: #241c45; color: #cfc8ec;
  }
  .seg-btn.is-on { background: #ff5d8f; border-color: #ff5d8f; color: #fff; }
  .overlay button.go {
    margin-top: 6px; padding: 12px 30px; font-size: 17px; font-weight: 800; border: none; border-radius: 10px;
    background: linear-gradient(180deg,#ffd24a,#ff9d2e); color: #5a2e00; cursor: pointer;
    box-shadow: 0 5px 0 #b06a00;
  }
  .overlay button.go:active { transform: translateY(3px); box-shadow: 0 2px 0 #b06a00; }
  /* 設定ドロワー */
  .drawer-backdrop { position: fixed; inset: 0; background: rgba(8,5,20,0.6); display: none; z-index: 70; }
  .drawer-backdrop.show { display: block; }
  .drawer {
    position: fixed; left: 50%; top: 50%; transform: translate(-50%,-50%); z-index: 80;
    width: min(340px,92vw); background: #241c45; border: 2px solid #6a5aa0; border-radius: 14px;
    padding: 18px; display: none;
  }
  .drawer.show { display: block; }
  .drawer h3 { margin: 0 0 12px; font-size: 18px; }
  .row { display: flex; align-items: center; justify-content: space-between; margin: 12px 0; }
  .row .lab { font-size: 14px; color: #cfc8ec; }
  .sound-toggle input { width: 18px; height: 18px; accent-color: #ff5d8f; }
  .drawer .seg-btn { padding: 7px 12px; font-size: 14px; }
  .drawer button.close {
    margin-top: 10px; width: 100%; padding: 11px 0; border: none; border-radius: 9px;
    background: #6c5ce7; color: #fff; font-size: 15px; font-weight: 800; cursor: pointer;
  }
  .credit { font-size: 11px; color: #9b93c4; margin-top: 12px; text-align: center; }
  .keys { font-size: 12px; line-height: 1.9; color: #cfc8ec; margin-top: 6px; }
  .keys b { color: #fff; }

  @media (max-width: 720px) {
    body { height: 100vh; height: var(--app-height, 100vh); overflow: hidden; }
    #stage { padding: 6px 4px; height: 100%; }
    #arena { gap: 4px; max-width: 100%; }
    #center { flex-basis: 64px; gap: 6px; }
    .vs { font-size: 16px; }
    .nx canvas { width: 52px; }
    .scorebar { font-size: 15px; }
    .namebar { font-size: 12px; }
    .ojama-row { height: 22px; }
    .keys { display: none; }
    .pad { gap: 16px; margin-top: 8px; }
    .btn { width: 52px; height: 52px; font-size: 20px; }
  }
</style>
</head>
<body>
<div id="stage">
  <div id="arena">
    <div class="side p">
      <canvas class="ojama-row" id="oj-p" width="264" height="32"></canvas>
      <div class="bwrap">
        <canvas class="board" id="bd-p" width="264" height="528"></canvas>
        <div class="ko" id="ko-p">✕</div>
      </div>
      <div class="scorebar" id="sc-p">00000000</div>
      <div class="namebar p">あなた</div>
    </div>
    <div id="center">
      <div id="stars">
        <span class="star p" id="st-p2">★</span>
        <span class="star p" id="st-p1">★</span>
        <span class="win">WIN</span>
        <span class="star c" id="st-c1">★</span>
        <span class="star c" id="st-c2">★</span>
      </div>
      <div class="vs">VS</div>
      <div class="nextpair">
        <div class="nx"><span>YOU</span><canvas id="nx-p" width="104" height="150"></canvas></div>
        <div class="nx"><span>CPU</span><canvas id="nx-c" width="104" height="150"></canvas></div>
      </div>
      <button class="gear" id="gear" aria-label="設定">⚙</button>
    </div>
    <div class="side c">
      <canvas class="ojama-row" id="oj-c" width="264" height="32"></canvas>
      <div class="bwrap">
        <canvas class="board" id="bd-c" width="264" height="528"></canvas>
        <div class="ko" id="ko-c">✕</div>
      </div>
      <div class="scorebar" id="sc-c">00000000</div>
      <div class="namebar c">CPU</div>
    </div>
  </div>
  <div class="pad">
    <div class="pad-group">
      <div class="pad-label">移動</div>
      <div class="pad-row">
        <button class="btn" id="btn-left">◀</button>
        <button class="btn" id="btn-down">▼</button>
        <button class="btn" id="btn-right">▶</button>
      </div>
    </div>
    <div class="pad-group">
      <div class="pad-label">回転</div>
      <div class="pad-row">
        <button class="btn rot" id="btn-rotL">↺</button>
        <button class="btn rot" id="btn-rotR">↻</button>
      </div>
    </div>
  </div>
</div>

<div class="overlay show" id="startov">
  <h2>ぷよぷよ</h2>
  <p>モードを選んでスタート</p>
  <div class="seg" id="mode-seg">
    <button class="seg-btn is-on" data-m="vs">CPU対戦</button>
    <button class="seg-btn" data-m="solo">一人で練習</button>
  </div>
  <div id="diff-wrap">
    <p style="margin:2px 0 6px">CPUの強さ</p>
    <div class="seg" id="diff-seg">
      <button class="seg-btn" data-d="0">弱</button>
      <button class="seg-btn is-on" data-d="1">中</button>
      <button class="seg-btn" data-d="2">強</button>
    </div>
  </div>
  <button class="go" id="start-btn">スタート</button>
  <div class="keys">
    <b>A/D</b> 移動 ／ <b>S</b> 高速落下 ／ <b>←/→</b> 回転
  </div>
</div>

<div class="overlay" id="resultov">
  <h2 id="result-title">YOU WIN!</h2>
  <p id="result-sub"></p>
  <button class="go" id="again-btn">もう一度</button>
</div>

<div class="drawer-backdrop" id="drawer-backdrop"></div>
<div class="drawer" id="drawer">
  <h3>設定</h3>
  <div class="row">
    <span class="lab">CPUの強さ</span>
    <div class="seg" id="diff-seg2" style="margin:0">
      <button class="seg-btn" data-d="0">弱</button>
      <button class="seg-btn is-on" data-d="1">中</button>
      <button class="seg-btn" data-d="2">強</button>
    </div>
  </div>
  <div class="row">
    <span class="lab">色の種類</span>
    <div class="seg" id="color-seg" style="margin:0">
      <button class="seg-btn is-on" data-n="4">4色</button>
      <button class="seg-btn" data-n="5">5色</button>
    </div>
  </div>
  <label class="row sound-toggle" style="cursor:pointer">
    <span class="lab">サウンド</span>
    <input type="checkbox" id="sound" checked>
  </label>
  <div class="credit">連鎖ボイス: VOICEVOX:ずんだもん</div>
  <button class="close" id="drawer-close">閉じる（再戦）</button>
</div>

<script>
(() => {
  // ===== 可視領域の高さを実測(スマホのツールバー対策) =====
  function setAppHeight() {
    const vv = window.visualViewport ? window.visualViewport.height : Infinity;
    const h = Math.min(window.innerHeight || Infinity, vv);
    if (h && isFinite(h)) document.documentElement.style.setProperty('--app-height', h + 'px');
  }
  setAppHeight();
  window.addEventListener('resize', setAppHeight);
  window.addEventListener('orientationchange', () => setTimeout(setAppHeight, 300));
  if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', setAppHeight);
    window.visualViewport.addEventListener('scroll', setAppHeight);
  }

  // ===== 定数 =====
  const COLS = 6, ROWS = 12, CELL = 44;
  const HIDDEN = 2, TOTAL = ROWS + HIDDEN;
  const OJAMA = 99;   // おじゃまぷよを表す盤面値(通常色 0-4 と区別)
  const COLORS = ['#e63a2b', '#54b22e', '#2f7fd0', '#f7c01a', '#9d55d4'];
  const EDGE   = ['#9c1d14', '#2c7a1b', '#1a4f93', '#cf9400', '#65299c'];
  const SHAPE  = ['blob', 'horns', 'bubble', 'drop', 'blob'];
  const FACE_KIND = ['angry', 'classic', 'classic', 'happy', 'sleepy'];
  const CHAIN_HUES = ['#ffe14a', '#ffb24a', '#ff7a4a', '#ff4a8c', '#c46bff', '#5a9bff'];
  const DR = [-1, 0, 1, 0];
  const DC = [0, 1, 0, -1];
  const TARGET = 70;   // おじゃま1個あたりの目標点

  // 色ユーティリティ

  function _rgb(h) {
    h = h.replace('#', '');
    return [parseInt(h.slice(0, 2), 16), parseInt(h.slice(2, 4), 16), parseInt(h.slice(4, 6), 16)];
  }


  function mix(a, b, t) {
    const A = _rgb(a), B = _rgb(b);
    return `rgb(${Math.round(A[0] + (B[0] - A[0]) * t)},${Math.round(A[1] + (B[1] - A[1]) * t)},${Math.round(A[2] + (B[2] - A[2]) * t)})`;
  }

  const lighten = (c, t) => mix(c, '#ffffff', t);
  const darken = (c, t) => mix(c, '#000000', t);
  const _rgba = (c, a) => {
    let r, g, b;
    if (c[0] === '#') { [r, g, b] = _rgb(c); }
    else { [r, g, b] = c.match(/\d+/g).map(Number); }
    return `rgba(${r},${g},${b},${a})`;
  };

  // ===== サウンド(Web Audio) =====
  let audioCtx = null, soundOn = true;
  let gPaused = false, gGameOver = false;   // BGM制御用(コントローラが更新)
  function ensureAudio() {
    if (!audioCtx) { const AC = window.AudioContext || window.webkitAudioContext; if (AC) audioCtx = new AC(); }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    if (audioCtx) {
      try { const b = audioCtx.createBuffer(1, 1, audioCtx.sampleRate); const s = audioCtx.createBufferSource(); s.buffer = b; s.connect(audioCtx.destination); s.start(); } catch (e) {}
      loadVoices();
    }
  }
  // BGM
  let bgm = null, bgmRate = 1;
  function ensureBGM() { if (!bgm) { bgm = new Audio('One_Last_Combo.mp3'); bgm.loop = true; bgm.volume = 0.32; } }
  function startBGM() { if (!soundOn || gGameOver || gPaused) return; ensureBGM(); if (bgm.paused) { const p = bgm.play(); if (p && p.catch) p.catch(() => {}); } }
  function stopBGM() { if (bgm && !bgm.paused) bgm.pause(); }
  function updateBGMTempo(danger) {
    if (!bgm) return;
    const target = gGameOver ? 1 : 1 + danger * 0.6;
    bgmRate += (target - bgmRate) * 0.08;
    if (Math.abs(bgmRate - target) < 0.005) bgmRate = target;
    try { bgm.preservesPitch = true; bgm.mozPreservesPitch = true; bgm.webkitPreservesPitch = true; } catch (e) {}
    bgm.playbackRate = bgmRate;
  }

  function tone(freq, dur, type, vol, slideTo, delay) {
    if (!soundOn || !audioCtx) return;
    const t0 = audioCtx.currentTime + (delay || 0);
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type || 'sine';
    osc.frequency.setValueAtTime(freq, t0);
    if (slideTo) osc.frequency.exponentialRampToValueAtTime(slideTo, t0 + dur);
    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.exponentialRampToValueAtTime(vol, t0 + 0.012);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(gain).connect(audioCtx.destination);
    osc.start(t0);
    osc.stop(t0 + dur + 0.03);
  }

  const sMove   = () => tone(380, 0.05, 'square', 0.05);
  const sRotate = () => tone(560, 0.06, 'square', 0.06, 680);
  const sLand   = () => { tone(150, 0.13, 'sine', 0.16, 90); tone(300, 0.07, 'triangle', 0.05); };
  const sDrop   = () => tone(120, 0.09, 'sine', 0.10, 80);

  function sPop(chain) {            // 連鎖が進むほど高い・かわいいキラッとした音
    const base = 660 * Math.pow(2, Math.min(chain - 1, 12) / 12); // 連鎖ごとに半音ずつ上昇
    // ぷるんと弾けるメイン(やわらかいsineで上にスライド)
    tone(base, 0.16, 'sine', 0.15, base * 1.7);
    // 少し遅れて5度上の「ぴょん」(かわいい跳ねる感じ)
    tone(base * 1.5, 0.15, 'sine', 0.11, base * 1.5 * 1.5, 0.055);
    // さらに高音の「キラッ」(きらめき)
    tone(base * 3, 0.12, 'triangle', 0.05, base * 3 * 1.25, 0.10);
  }


  function sZenkeshi() {            // 全消しのファンファーレ(上昇アルペジオ+キラーン)
    const seq = [523, 659, 784, 1047, 1319];   // C-E-G-C-E
    seq.forEach((f, i) => tone(f, 0.2, 'triangle', 0.12, f * 1.02, i * 0.09));
    tone(2093, 0.5, 'sine', 0.07, 2300, 0.46);
  }


  function sGameOver() {            // ゲームオーバー: ドンと落ちて下降する「崩れる」音
    tone(220, 0.5, 'sawtooth', 0.16, 70);        // 全体が下降していく
    tone(110, 0.6, 'sine', 0.18, 45, 0.04);      // 低い土台
    const seq = [392, 330, 262, 196];            // G-E-C-G と力なく下る
    seq.forEach((f, i) => tone(f, 0.22, 'triangle', 0.10, f * 0.94, 0.12 + i * 0.12));
  }


  // ===== 連鎖ボイス(mp3優先・TTSフォールバック) =====
  const CHAIN_SPELLS = [
    { show: 'えいっ！',       say: 'えいっ',         file: 'voice/0.mp3' },
    { show: 'ファイヤー',     say: 'ファイヤー',     file: 'voice/1.mp3' },
    { show: 'アイスストーム', say: 'アイスストーム', file: 'voice/2.mp3' },
    { show: 'ダイヤキュート', say: 'ダイヤキュート', file: 'voice/3.mp3' },
    { show: 'ブレインダムド', say: 'ブレインダムド', file: 'voice/4.mp3' },
    { show: 'ジュゲム',       say: 'ジュゲム',       file: 'voice/5.mp3' },
    { show: 'ばよえーん',     say: 'ばよえーん',     file: 'voice/6.mp3' },
  ];
  const voiceBuffers = new Array(CHAIN_SPELLS.length).fill(null);
  const voiceBytes = new Array(CHAIN_SPELLS.length).fill(null);   // 先読みしたmp3バイト列
  let voiceLoadStarted = false, voiceSource = null, jaVoice = null;
  // ページ表示時にmp3を即先読み(fetchはユーザー操作前でもOK)。スタート後の最初の連鎖でも間に合わせる
  if (typeof fetch === 'function') {
    CHAIN_SPELLS.forEach((spell, i) => {
      if (!spell.file) return;
      fetch(spell.file).then((r) => (r.ok ? r.arrayBuffer() : Promise.reject())).then((b) => { voiceBytes[i] = b; }).catch(() => {});
    });
  }
  function pickJaVoice() {
    if (!('speechSynthesis' in window)) return;
    const vs = speechSynthesis.getVoices().filter((v) => /ja[-_]?JP|^ja$/i.test(v.lang) || /日本語/.test(v.name));
    if (!vs.length) { jaVoice = null; return; }
    const FEMALE = /(google|kyoko|o-?ren|sayaka|haruka|nanami|mizuki|female|女性|あおい|さくら)/i;
    const MALE = /(otoya|hattori|ichiro|male|男性)/i;
    const NICE = /(google|enhanced|premium|neural|natural|高品質|plus|siri)/i;
    const sc = (v) => (FEMALE.test(v.name) ? 10 : 0) + (MALE.test(v.name) ? -10 : 0) + (NICE.test(v.name) ? 4 : 0) + (/google/i.test(v.name) ? 3 : 0);
    jaVoice = vs.slice().sort((a, b) => sc(b) - sc(a))[0];
  }
  if ('speechSynthesis' in window) { pickJaVoice(); speechSynthesis.onvoiceschanged = pickJaVoice; }
  function loadVoices() {
    if (voiceLoadStarted || !audioCtx) return;
    voiceLoadStarted = true;
    CHAIN_SPELLS.forEach((spell, i) => {
      if (!spell.file) return;
      const decode = (buf) => audioCtx.decodeAudioData(buf).then((d) => { voiceBuffers[i] = d; }).catch(() => {});
      if (voiceBytes[i]) decode(voiceBytes[i]);   // 先読み済みなら即デコード(待たない)
      else fetch(spell.file).then((r) => (r.ok ? r.arrayBuffer() : Promise.reject())).then(decode).catch(() => {});
    });
